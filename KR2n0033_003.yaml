body:
  text: 石墨鐫華卷三明趙崡撰䟦四十六首唐郭敬之家廟碑碑在今陜西布政司御題額顔魯公撰并書敬之汾陽忠武王父也夫以汾陽家廟得魯公手書千載而下猶有生氣其文與書又非所論也但其碑在役人雜遝之所雖巋然壁上而不無磨蝕之憂然以二公之靈鬼神呵䕶有由來矣唐郭敬之家廟碑隂碑隂具述汾陽兄弟子孫始知汾陽兄弟九人皆列大位不止史所稱㓜明一人而已且汾陽封拜與史小異錄具左方碑正書隂作行書不審亦出魯公否觀其筆力似非魯公不能也按碑隂子儀武舉及第授左衞長上改河南府城臯府别將又改同州興德府右果毅左金吾衞知隊長上又改汝州魯陽府折衝長上知右羽林軍又遷桂州都督府長史充當管經畧副使又改北􅒉副都䕶充四鎭經畧副使又除左威衞中郎將轉右司禦率兼安西副都䕶改右威衞將軍同朔方節度副使改定逺城使本軍營田使又加單于副大都䕶東受降城使左廂兵馬使又拜右金吾衞將軍兼判單于副都䕶又拜左武衞大將軍兼安北副都䕶横塞軍使本軍營田使又兼充天德軍使安北副都䕶又兼豐州都督西受降城使右廂兵馬使改衞尉卿兼單于安北副大都䕶靈州刺史攝御史中丞權充朔方節度關内支度營田塩池押諸蕃部落副大使知節度事六城水運等使又拜御史大夫餘並如故又拜兵部尚書同中書門下平章事兼單于安北副大都䕶靈州大都督府長史節度等使餘如故又特加銀青光祿大夫又拜司空餘如故又充副元帥餘如故又拜尚書左僕射同平章事兼武部尚書餘如故又加朔方管内採訪處置使又加司徒封代國公食實封一千戸餘如故又兼中書令司徒兼靈州大都督府長史單于鎭北副大都䕶朔方節度等諸使餘並如故又充東京畿及山南東道并河南等道諸節度防禦兵馬元帥仍權知東京留守判留司尚書省事餘如故又兼邠寜鄜坊等兩道節度使又封汾陽郡王知朔方河中北庭潞儀澤沁等節度行營兼興平定國等軍兵馬副元帥仍充本管觀察處置使餘並如故加實封五百戶又加實封二百戶又加實封二百戶又充關内副元帥餘如故又兼上都留守餘如故又兼河東副元帥河中節度本道觀察處置等使兼河中尹餘如故又兼靈州大都督單于鎭北大都䕶充朔方節度大使及關内支度營田塩池押諸蕃部落等使六城水運使管内觀察處置使餘如故又拜太尉兼河西副元帥通和吐蕃等使餘如故又拜尚書令兼中書令餘如故史稱子儀初授左衞長史累遷單于副都䕶振逺軍使又以天徳軍使兼九原太守又為衛尉卿靈武郡太守又加實戸七百頗與碑不合碑立于廣徳二年十一月子儀是時年六十八歳官止于尚書令兼中書令故不及攝冡宰尊尚父等事但史言子儀辭尚書令碑乃實書之且通鑑拜尚書令在十二月此前一月書當是史誤唐多寳佛塔感應碑魯公正書惟此碑最著以其字比諸碑稍小便于展玩耳而結法視東方讃家廟碑似覺少遜王元羙曰貴在藏鋒小逺大雅不無佐史之恨信然碑舊在興平千福寺不知何時移立西安府學中唐將軍臧懷恪碑魯公此書偉勁而骨稍瘦于家廟諸碑皆可重也王元羙云臧懷恪再為王晙蕭嵩兵馬使積官右武衞將軍封上蔡縣侯三贈至工部尚書以子希讓貴故也兄懷亮至左羽林大將軍懷恪有子七人咸貴而希讓至尚書節度魯國公碑稱兄弟子姓勛賢間出自開元至于天寳乘朱輪而拖珪組者數百人而史不為傳故聊載之唐東方曼倩讃碑此碑在山東陵縣王元美曾得舊本余所収乃長安故家者小小磨泐當與元羙家搨本同書法峭㧞奮張固是魯公得意筆也元羙謂東方生蹟固竒詭夏侯文亦有壺公薊子意獨公書嚴整未稱不若留右軍寫其情性可也余則謂魯公以忠義而好神仙小説載公殁后指甲金色透出手背又寄家人手書事雖渉怪誕而亦可以證公深于神仙之術固東方生千載至契也然其筆却無物外姿態不如書汾陽家廟大是本色唐顔氏家廟碑李陽氷篆額顔魯公撰并書石四靣環轉製法精工廟不知在何處後燬宋初有李延襲者語郡守移置文廟此書結法與東方讃正同勁節直氣隠隠筆畫間唐中興頌碑磨崖中興頌碑自歐陽公集古錄已謂其歳乆剥裂字多缺殘好事者以墨増補之王元羙最愽雅乃云字畫方正平穏不露筋骨當為魯公法書第一豈元羙所見乃崖石真本耶余獲一紙恐是棗刻雖筋骨不露而神氣全亡惜不得至永州崖下一證之唐八關齋㑹碑此永州將吏為節度使田神功項疾愈作齋㑹也神功故非良臣徐向等媚其主帥非佳事而魯公為撰為書何也乃其字法大徑三寸許方整遒勁不減曼倩讃家廟碑唐干禄字帖此本模刻最多此亦模本也故魯公靣目十失八九攷歐公集古録開成中已有楊漢公模本矣漢公謂工人為衣食業故摹多速損歐公云公書為世楷模而此字書辨正偽謬尤盛傳所以損爾世人所傳乃漢公模本真本以不完遂不傳然則真本不知在否但得漢公本似猶勝木本也又讀王元羙䟦乃謂無一筆縱緩藏之為臨池指南元羙好古或宜有真本耳抑亦漢公本耶唐争坐位書藁魯公草行不知何時上石石已泐矣而法猶可尋王元羙云無一筆不作晋法所謂無意而文從容中道者也又云公剛勁義烈之氣文不能發而發之于筆墨間余嘗謂公學不如其人于麻姑壇記見之詞不如筆楷不如行有意不如無意于此帖見之而都𤣥敬乃謂草草之筆亦為摹刻目中有筆余不能不服膺元羙此碑雖泐而顔公筆法宛然近董氏摩入戯鴻堂帖乃云陜省者不足觀而自謂存魯公法度今以余觀董氏刻視此則神亡多矣唐顔真卿奉使題字魯公行書奉命來此事期未竟止緣忠勤無有旋意又作二語云人心無路見時事只天知宋刻同州下有公小像不知原刻在何處然觀其詞意乃使李希烈時也亦足悲矣唐華岳題名凢二紙其一則乾元元年顔魯公自蒲州刺史除饒州與監察御史王延昌穆寜評事張澹華隂令劉暠主薄鄭鎮同謁題魯公真書其一則上元元年華隂令王宥前令王紓丞王沭尉李齊權領鄭縣簿張彬尉竇彧下邽丞李演尉邢渉處士王季友張彪著作郎孟昌原法曹參軍李樞同謁題年月上方用小篆姓名下方用分𨽻皆樞書老勁不作俗筆歐陽公集華岳題名自開元至清泰五百餘人今存者止此耳為之一慨唐顔真卿㫁碑華州王氏掘地得石一片云員外郎瑯琊顔真卿書又有云都官郎中東海徐浩篆其餘數十字則不成文不可知何碑但其字法雖嚴正而鉤磔處不及魯公他碑存之以俟考唐雲麾將軍碑北海書逸而遒米元章謂其屈強生踈似為未當此碑是其得意者雖剥蝕過半而存者其鋩鎩凛然碑在蒲城楊用修謂已㫁正徳中劉逺夫御史以銕束之又謂已亡朱秉器又謂良鄉亦有此碑蒲城者為趙文敏臨書今蒲城碑尚在未㫁無有鐵束事且蒲城李思訓葬處北海真蹟的非文敏所能良鄉本肥媚文敏書無疑楊朱二公未嘗至蒲城而朱公尤為瞽㫁唐岳麓寺碑此碑俞仲蔚謂勝雲麾王元美謂殘楮㫁墨猶足傾倒眉山吳興余初未見一日逰長安有書賈持一碑来售余知其為北海書亟伸之則岳麓寺碑也雖漫漶然筆意猶存亦不能勝雲麾差伯仲耳雲麾下半已無字上半存者乃如新此碑雖首尾皆可讀而鈎磔波撇不復可尋當是石理有堅脆也唐葉有道先生碑北海分𨽻固自遒逸雖于漢人不無小遜而與梁昇卿韓擇木輩逐鹿未知死誰手矣又趙明誠錄二碑一為邕行書一為韓擇木八分書此正分書而曰邕不知何故豈后世翻本者未見邕碑而以韓書附㑹邕名耶書以俟考唐淄川公李孝同碑孝同者淮安靖王神通之子史但附名神通傳末碑亦磨泐可讀者才半中有云太宗為秦公孝同𨽻焉承間啓王曰秦公瞻視非常功業又大雖非儲貳必膺寳歴靖王心然之云云此亦可為先見矣撰文姓氏已不可求書者㩀趙明誠為諸葛思楨今亦磨蝕但其筆法虬健波拂處大類禇河南可寳也唐祝府君碑此祝欽明叙述其父綝之碑也綝字叔良功名不顯以欽明貴故竪碑欽明仕中宗朝建議皇后助祭天地其人品殊無足稱但碑書法是習伯施登善而有得者非近世能書家所及趙明誠已云姓名殘缺矣唐李劍州廣業碑廣業即孝同之孫為劍州長史長子國貞為王元振所害者次子若水仕金吾衞大將軍通事舍人功名俱不顯以國貞子錡貴始樹此碑考之史國貞原名若幽而附若水于李齊物傳云齊物族弟不言為國貞親弟又孝同碑云有子瑱此碑云雲麾將軍璲公之烈考則廣業家世歴歴可尋至錡以叛遂亡此碑貞元二十年立后五年錡始叛也王元羙謂書撰人皆不可考今碑中有云謂雲逵嘗學舊史云云而前署撰者官刑部侍郎當是鄭雲逵攷雲逵正與李錡同時撰文亡疑但碑又云上柱國原武縣開國男雲逵傳不及或史略之其書者則誠不可考書法直是徐浩敵手唐于大猷碑此碑僅存強半書法全出登善峻㧞遒健可為傳神而書者名氏遂不可求惜哉按大猷志寜之孫立政之子志寜之𤣥孫休烈顯于肅代朝傳云休烈父黙成沛縣令早卒合之正為四世但不知黙成者是大猷子否趙明誠有黙成碑今不可得見矣以上四碑皆在三原北原余觀其書法皆可寳藏而知者最少且四人家世明㓕史册間故為稍論著云唐贈池州刺史馮公碑此當是道士馮道力父名仁闕字太𤣥道力與劉成祖占𤣥宗當受命潜布欵誠開元中拜道力銀青光禄大夫兾國公而又拜其父朝散大夫使持節池州諸軍事池州刺史也開元十一年五月卒十一月壬申葬咸陽北原建碑今在長陵西碑云意得𤣥珠謀參黄石同心戴舜以為天子盖指𤣥宗受命事也書者為國子監丞郭謙光謙光又嘗書韋維碑見鄭樵金石略朱長文古碑考則其書亦小有聲者此碑分𨽻自是名家惜剥蝕不可搨余與王咸陽從碑上録之王公刻入金石遺文字多舛謬攷道力與劉承祖同事承祖開元十年坐姜皎事配雷州詔百官不得與卜祝之人徃來而道力父尚爾建碑禍不及耶以道力事不顯故參攷而著之唐臨淮武穆王李光弼碑張少悌書在當時不大知名而此碑殊勁㧞清圓深得右軍行草遺意惜殘缺不完耳于李公中興偉略不得一一證之唐史耳唐西平忠武王李晟碑碑在髙陵縣王墓前裴晋公撰栁誠縣書已磨泐不可讀矣都𤣥敬全錄其文止缺數字又别本有刻者與碑亦牴牾數字當是傳寫之誤王元羙云是時西平諸子皆已逝獨太保聽存乞晋公文寥落不能發其忠義戡定之績至于料吐蕃背盟事絶不載盖聽于其時徒見晋公禄位勲業之盛幾埓西平意其文足以光顯其先而不知晋公雖非忌者自以為位宰相文崇簡要體當如是而于西平之元功偉略十不著一二嗚呼今碑首云奉勅撰書序末云乃命臣度稱代言時似非聽乞也元羙豈未讀全文耶都𤣥敬又錄其官時與史不合者極詳今抄具左碑謂晟由左清道率歴三府右職累遷至光禄太常卿傳則云授特進試太常卿碑謂晟為涇原四鎮北庭節度都知兵馬使代宗徴之以左金吾衞將軍為神策軍兵馬使傳則云以右金吾衞大將軍為涇原四鎮北庭兵馬使碑謂晟平蜀還授檢校太子賔客而傳不書碑建中二年以晟為神策先鋒都知兵馬使加御史中丞尋拜左散騎常侍兼御史大夫傳則云晟為神策先鋒加檢校左散騎常侍兼魏府左司馬尋授御史大夫碑謂皇居失守授晟檢校工部尚書充神策行營節度使傳則云詔拜神策行營節度使碑謂大駕再遷加檢校右僕射尋轉左僕射同平章事兼京兆尹神策軍京畿鄜坊節度觀察等使管内及商華等州副元帥復詔晟兼河中晋絳慈隰節度使又兼京畿渭北鄜坊丹延節度招討使又進京畿渭北鄜坊商華兵馬副元帥傳則云進晟尚書左僕射同中書門下平章事復詔晟兼河中晋絳慈隰節度使又兼京畿渭北鄜坊丹延節度招討使又進京畿渭北鄜坊商華兵馬副元帥碑謂鑾輅爰歸拜司徒兼中書令俄以本官兼鳳翔尹鳳翔隴右節度觀察等使及四鎮北庭涇原等州副元帥改封西平郡王傳則云拜晟司徒兼中書令尋拜鳳翔隴右涇原節度使兼行營副元帥徙王西平郡晟之碑作於當時而史成於後代要當以碑為是又碑所記公子十二人史云十五人亦當從碑唐蘇許公碑蘇許公瓌武功人景雲元年十一月𦵏于武功碑𨽻書剥蝕過半存者才十三書法猶有漢魏遺意金石略云盧藏用書而金石録云藏用撰書攷文苑英華藏用撰序張説撰銘今碑后猶有范陽張説字鄭趙二公未見耶唐契苾明碑明契苾何力子也婁師德製文􅎋𤣥祚書筆法亦瘦勁可觀碑中契苾何力作河力史謚曰烈碑謚曰毅疑史為誤碑中叙明子前曰長男嵸后曰聳二字自相牴牾且明長子嵸襲封凉公而后云孤子息凉國公嵩立又何也明葬于萬嵗通天元年碑立于先天二年仍稱大周革命仍用武氏製字都不可曉唐段行琛碑此碑名不著而書法遒逸豐羙極是當家書者為張増増無書名亦可以知唐人能書者多矣非此碑則后世不知有増也按碑行琛者忠烈公秀實父忠烈兄弟四人長祥頴次公次秀成次同頴史傳不著因為拈出碑又不署撰文者姓名豈即張増耶忠烈公汧陽人碑在汧陽完好可搨趙明誠金石録又有一碑云楊炎撰蕭正書與此不同而却無此碑豈段公有二碑耶書之以俟考唐尚書馮宿碑此碑柳書結字小差勝𤣥秘塔碑尚不堪與薛稷雁行楊用修云亞于廟堂碑過矣大都栁書筋骨太露不免支離宜米南宫之鄙為惡扎而宣城陳氏之咲其不能用右軍筆也唐王忠嗣碑忠嗣殁于天寳初碑立于大歴十年元載撰文王縉書載忠嗣女夫縉王摩詰兄也縉名能書結法老勁真可與李邕伯仲然恣態婉媚啓后世如趙承㫖諸人書者此等碑也唐田仁琬徳政碑此蘇靈芝書靈芝武功人生開元天寳間書與胡霈然齊名霈然書評者謂其格力不揚今霈然書不可見見此碑可以得其槪矣大都源出聖教而肥媚為多尚不及王縉書王清源公碑而宣和譜擬之季海伯施季海不足論但恐伯施于地下笑人唐夢真容碑二種此蘇靈芝書按碑開元帝夢老子真容求得之中南之楼觀博州刺史李成裕奏准諸州同勒石則此碑天下皆刻之金石略載之云未詳所在余此碑并田仁琬碑得自郷人之守易州者或在易州今中南楼觀亦有此碑亦靈芝書文同而易州碑稱奉勅㫖宰相牛仙客楼觀碑稱張九齡按碑此事在開元二十九年閠四月九齡自二十四年罷相二十五年左遷荆州長史二十八年薨未嘗生至二十九年也似當以易州碑為是楼觀碑經宋翻刻字畫不及易州三舍豈亦謬易其姓名耶唐姜嫄公劉廟碑碑在邠州張獻甫為節度作廟祀姜嫄公劉者也高郢撰張誼書郢事李懐光能引譬忠義不為勢屈卓然名臣獨為相時不能制王叔文輩耳文尤冗弱殊無足稱張誼于書家不甚著此書不及王縉而略似栁公權亦足存也唐孔子廟詔表碑此高祖髙宗詔各一通祭文一通太子𢎞表一通皆分書金明昌中暴風折木􅐦碑仆趺損而碑不損刺史高德裔易趺樹之行書題六十五字于后王元羙曰其行筆不甚精工而時有漢意乃知古法自開元帝始盡變也唐修孔子廟墓碑此李北海邕撰而張庭珪書邕文不及書此碑是已庭珪名書書小史謂邕文必致珪書而評者有古木崩沙間花映竹語觀此亦未為的然但書趙盾作趙遁何也唐贈太師孔宣公碑此崔行功撰孫庭範書行功嘗書開元寺千佛記者庭範無書名而此碑分𨽻是唐初法亦有漢魏遺意可與唐詔表碑同觀唐孔温裕修孔廟碑温裕孔子三十九代孫能以私俸奏請葺廟宜蒙嘉奬矣碑賈防撰文聊略未稱書者無名氏而亦有顔清臣栁誠懸遺意不作惡扎唐兖公之頌碑兖公顔回也字子淵碑避高祖諱作子泉都督李庭誨命縣令張之宏撰頌包文該正書書遒勁有法石惡多泐耳唐華岳精享碑此唐開元帝遺蘇頲禱雨華山有應而建碑也作者為主簿咸􅘙書者為御史劉升升見金石略僅二碑而遺此今觀其𨽻古遒逸有漢人遺意五代以降求此一批法不可得矣唐昭告華岳碑韓擇木以八分名昔人評之曰雖姿宇不至峻茂而嚴正可畏杜子羙云尚書韓擇木騎曹蔡有鄰開元以來數八分觀此碑良是碑文韓賞為補闕禱華岳而作大要與神盟欲忘身奉國其詞則余無耴焉唐述聖頌碑碑在華陰縣岳廟中達奚珣撰序呂向撰頌并書不著年月攷呂向開元中召入翰林此碑稱集賢殿直學士當是開元中立碑云藻翰自天發揮神化建碑于廟以光寵焉又云樹之平地嶷若㫁山六龍盤薄糺其上群神離立負其下當是頌𤣥宗所建華岳碑也今其碑已裂趺尚存如山上存二字大可徑四寸許分𨽻不减太山銘而呂向此書尚完在一道士院中向書昔人稱其草𨽻峻巧又能一筆環寫百字號連綿書又云歐鍾相雜自是一調筋骨乾枯精神嶮峭今觀此碑雖勁健自喜然不堪與登善作衙官唐碧落碑段成式謂此碑有碧落字故以名李肇謂此碧落觀也故名李漢謂終于碧落字而名歐陽公謂其宫有碧落尊像文刻其背故名碧落碑董逌攷其地原名碧落觀改龍興宫以李肇説為是其書雜出頡籕鍾鼎欵識或以為陳惟玉書或以為李譔李讙書皆不可辨洛中記異錄又云刺史李諶為母房太妃追薦造像成有二道士來請書之閉戶三日乃開化二白鴿飛去篆文宛然像背此説尤恠誕然李陽氷觀之七日而不忍去學之十二年而不成其妙如此豈易知哉又一説陽氷毁其佳者數字而去未知然否篆文原刻像背州將以不便摹搨别刻置廟中今所傳皆摹本也其文曰有唐五十三􅑤龍集敦牂歐公謂為高宗緫章三年董逌謂為咸亨元年按緫章三年三月始改咸亨耳唐碧落碑釋文釋文鄭承規書咸通中立書法方整甚有歐虞遺意唐李元諒昭徳懋功碑李元諒者駱元光賜姓名也以朱泚之亂能鎮定華州将徒治隴右故華州人感之行軍司馬董叔經請于天子立碑述頌也張濛撰韓秀弼分書秀弼手筆固是君家尚書公嫡𣲖而碑頌駱公詞無虛溢并可重也駱公封武康郡王謚莊威舊史不収見新唐書此所謂事増于前者乎唐邠國公功徳銘此䆠者梁守謙造經于興唐寺而䕶軍中尉楊承和為銘之書之者也書全法歐陽蘭䑓方整老勁所不及者結搆小踈耳但頌䆠者功徳乃謂淮蔡之功十居其七將令裴李諸公何處生活唐嵩陽觀碑嵩陽觀聖徳感應頌乃道士孫太冲為明皇煉丹六轉而移緱氏山九轉而李林甫紀其瑞徐浩書其碑者也碑于天寳三載是時開元之政已弊而林甫以姦佞為詞本無足採但浩分𨽻與史惟則輩幾欲伯仲矣唐𤣥秘塔碑塔為大達法師建者碑裴休撰栁誠懸書書雖極勁健而不免脱巾露肘之病大都源出魯公而多踈此碑是其尤甚者唐𤣥秘塔碑隂碑隂僧正言買庒造經堂疏正書亦方整可錄正言者大達弟子也石墨鐫華卷三
