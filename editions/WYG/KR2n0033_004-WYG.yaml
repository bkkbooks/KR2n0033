body:
  text: 石墨鐫華卷四明趙崡撰䟦四十七首唐不空禪師碑和尚不空也碑徐浩書浩傳曰父嶠之善書以法授浩世人貴之狀其書曰怒猊抉石渇驥奔泉尤為司空圖所愛又嘗論書曰鷹隼乏彩而翰飛戾天者骨勁而氣猛也翬翟備色而翺翔百歩者肉豐而力沉也若藻曜而髙翔是真書之鳯皇矣可謂誇詡之極今觀此碑雖結法老勁而微少清逸之致此在唐人書中似非其至者又癸夘嵗余過咸陽原有無畏不空禪師墓有塔記作于開元二十五年書法似顔平原已經再刋亡其筆意而叙述無畏過龍河一駞負經沒水隨之入龍王邀入宫講法留三宿經不濕一字又述不空于師子國國王調象象奔逸見不空皆跪伏二事極詳多與禪家所稱說合又辨西域僧呪傅奕事曰此好事者曲為之詞若果有是正謂邪術不足以疵吾教也又云佛制戒律生草猶不許比丘踐之况說斷人命呪傳于世乎其文可觀因幷錄于此唐道因禪師碑王元羙曰評者謂蘭臺瘦怯于父而嶮峻過之此碑如病維摩髙格貧士雖不饒樂而眉宇間有風霜之氣可重也余謂蘭臺故學父書而小變為險筆時兼𨽻分自是南北朝流風餘韻李仲璇孔廟碑趙文淵所書華岳碑可覆觀也唐楚金禪師碑吳通微為學士工行草然有譏其近吏者此碑清圓婉逸雖鉤磔小减而亦微有晉之丰度觀者當自得之唐大智禪師碑史惟則分𨽻書竇臮稱其古今折𠂻大小應變如因髙而矚逺俯川陸而必見今觀此碑信是開元間分書第一手嚴挺之文亦麗則可觀大智師見唐方技傳傳云開元二十年卒碑云二十四年唐大智禪師碑隂記碑隂陽伯成撰記施净財事而惟則書書法瘦而少態與前碑異何也唐圭峰禪師碑此碑裴相公休撰并書法全出歐陽信本而瘦勁不及也當時栁誠縣書名動一時乃任篆休自任書亦信能書矣余不敏竊謂此固當勝栁書唐隆闡法師碑此碑行書源出聖教而漸作婉媚纒繞殊乏晉人瘦勁蕭踈之趣碑為懐惲立都𤣥敬云無書撰人姓名碑中有弟子思莊敬想清徽勒兹𤣥琰則碑為惲之徒所撰未知是否而王元羙乃曰僧懐惲撰及書頗亦能為其家言筆法尤圓媺有聖教遺意今碑中叙惲生死甚備明云大足元年十月二十二日神遷春秋六十有二神龍元年勑贈隆闡大法師天寳二年建碑又弟子思莊云云如元羙言豈惲鬼撰書耶盖碑首后人妄增懐惲及書四字文理本不屬而元羙疑于及字上當有撰字遂誤耳元羙博學絶世似未見都𤣥敬金薤琳瑯又似未讀竟此碑然謂惲頗能為其家言又似并取其文者至人乃作夢語何也唐杜順和尚碑碑在開佛寺董景仁行書亦清勁但小弱耳唐寂照和尚碑此碑在咸陽西馬跑泉地中武功康子秀先生過而識之以語土人竪于道傍其后王咸陽移之咸陽城中寺以碑有安國寺字遂改名其寺為安國寺按碑段成式撰僧無可書成式文筆自竒此文為佛言尤竒無可賈島從弟有詩集傳世其書法出栁誠懸而優孟者子秀名梣太史徳涵子也唐御史臺精舍碑此梁昇卿追書崔湜文湜人品殊汚人齒頰而昇卿尚追書其文何也豈唐世重侫佛湜之立精舍于御史臺適投時好耶但昇卿分𨽻聲動一時東封朝覲碑史冊稱之今觀此碑名不虚耳唐御史䑓精舍碑隂題名碑隂題侍御史并内供奉殿中侍御史并内供奉監察御史名共六百餘人參差不齊分書者五六人餘皆正書書皆有法不似后世胥吏書也唐周公祠靈泉碑周公祠靈泉湧出大五小七凡十二處觀察崔珙奏狀勒石事在大中間石前刻奏狀中刻宣宗批答后刻珙謝表文詞宛至有盛世風書亦遒健有法且其叙列大似漢人碑例而遜其古質耳如此等碑宋以后恐不能得也唐濟安侯廟記記在華州唐昭宗在富平韓建迎之至華自華歸長安褒建而及于城隍神記為諫議大夫李巨川撰拾遺栁懐素書文固諛詞而楷則嚴整何如君家誠懸具眼者自知之唐法門寺重修塔廟碑碑稱天祐十九年是時唐亡已久李茂貞尚稱唐年號又二年而莊宗取梁茂貞稱臣又一年而茂貞死戰争之時得作此佛事者以梁晉搆兵茂貞偷安故也按傳貞先稱岐王莊宗改封秦王據碑則已先稱秦王矣碑王仁㳟書亦精勁有法唐順陵碑武三思撰相王旦書碑用武氏製字武三思稱􅖔猶可而旦亦曰􅖔旦當發一笑書不知真出旦否方整遒健可錄也碑已仆于乙夘之地震而亡于縣令之修河余猶從故家見其搨本唐本願寺碑此碑獲鹿縣按察家掘地得之乃鹿泉信士畢瑜造塔蔵舍利者行草亦不惡石理脆亡其真耳然是唐碑中之最下者唐武安君廟記廟在今咸陽東古杜郵起􅃤刻獨有將略耳亦杞至今何也壁間記唐乾符五年重修事正書遒勁亦有歐法知唐世官牒無不作佳書也記中所列添置物色有眺子舍一十間沙子三間􅂠一顔石押衙影等皆不可曉唐令新誡碑鄭樵略有新誡碑二一王遹篆一劉飛書趙明誠又有三紙歐公有六紙有正書有八分書者余所獲乃一王某行書盖開兀頒行時不但一州刻也碑雖泐甚然書法是深于聖教者唐陳居士殘碑武功人有耕而獲斷碑首者題曰大唐潁川陳居士塔銘篆書下有數十字首云居士諱生字善慶正書俱有法居士必侫佛者唐人好佛故死而張大之為塔耳余所取則以其書法見唐之能書者多也唐净住寺文賢像銘此碑河東裴行純追薦其父母而作碑之存者無㡬其分𨽻頗佳但瘦而不硬且刻手似出唐以后人留之以待博識者唐縉雲縣城隍廟記李陽冰為縉雲縣令值旱禱于城隍約五日不雨將焚其廟及期而雨乃遷廟而記其事書固竒事亦竒余觀其篆瘦細而偉勁飛動若神歐陽公以為視陽冰他篆最瘦余謂佳處正在此又云世言此石與忘歸䑓孔子廟三石俱活嵗久漸生刻處㡬合故細若然今去歐公又四五百年寜不為無字碑乎記云祀典無城隍神吳越有之至歐陽公云天下皆有縣猶少今則無縣無之矣且記云自西谷遷廟于山巔又以見城隍廟前朝不必在城中也今西安府西村落大者多有城隍是其遺意唐李陽冰先塋記此李氏卜𦵏李曜卿兄弟三人而弟季卿記從子陽冰書卜地人為邵權記云偏得管郭之道管謂公明郭則景純也玉筯書經大中祥符間翻刻故不及縉雲碑唐李陽冰三墳記此季卿表曜卿三墓陽冰書碑雖無翻刻字字畫法具而神亡似與前碑同王元羙乃謂石猶故物故無傳改之譌豈别一碑耶抑未見前碑耶元羙自任識書恐于此碑失之矣陽冰顔魯公家廟碑書作陽氷唐彌勒佛頌此房璘妻髙氏書髙氏又書安公羙政頌歐陽公謂字迹如出二手而疑好事者寓名以為竒余未見羙政頌此本借自東肇商觀其筆法遒勁信足名家而一經元祐火燬政和間寺主道珍重勒再經大定火燬㤗和間寺主元釗又勒鋩鎩都亡僅存形似耳金人闕苑䟦語厯厯可証近吾鄉人有為交城廣文者為言碑今又就燬交城人猶有舊榻本以此觀之當亦非開元刻乃泰和刻也然則碑自元祐至今凡三燬于火矣何髙氏之不幸耶唐宗聖觀主尹文操碑貟半千之取名謬為應運五百者碑文殊不稱可咲碑叙文操遊太白覩異像以為竒盖太白名山至今多見靈異不足竒也至謂老子降于壇間萬衆共覩則近誕矣書分𨽻遒古不著姓名且經元朝翻刻失真可惜唐李靖上西岳書此好事者誣衛公而為之書詞可咲而唐劉餗言衛公訴神且請告以官位詞色抗厲后有聲曰僕射好去顧不見后果如言以此觀之真有是書耶又小説載公射獵行雨事殆異人不可以常理論也書三種潞州者崇寧間刻藤縣者紹興間刻西岳廟則近刻筆亦遒逸王元羙稱之當是潞州本藤縣者不及近刻又下矣唐李輔光墓志巨雅正書清勁有聖教遺意𦵏在咸陽東北近涇萬厯中涇岸崩擁水不流三日乃得兹石其銘曰水竭原遷斯文乃傳適符其事可謂竒矣唐劉光俊墓志志髙肅撰無書者姓名光俊無殊績可稱肅文亦卑冗書行草習聖教如不能縛雞人學扛鼎以唐物故錄之唐比丘圓滿碑銘銘石斷殘不能一半棄華嚴寺敗垣中書者不知何人筆法全出禇登善波拂處虬健絶倫銘内有神龍二年并鎮國太平公主等語當是中宗時人習登善書者唐大遍覺禪師塔銘𤣥奘久居西域廣譯佛言唐太宗極尊崇之據史卒于顯慶六年即龍朔元年銘則云卒于麟徳元年之二月史云年五十六銘云年六十九先𦵏滻東后移徙樊川北原即少陵原文宗開成四年劉軻撰文僧建初書行草秀勁有法而文亦粗能言師事俱可存也唐大法師基公塔銘基公者尉遅敬徳之從子也度為僧譯經于慈恩寺卒于永淳中大和間始建塔李𢎞度銘之書者亦建初然其筆法不無少遜𤣥奘塔銘唐圓測法師塔銘法師諱文雅字圓測新羅王之孫也唐太宗時人與𤣥奘同翻經論萬嵗通天元年卒𦵏于龍門其徒又分骸𦵏于南山之巔政和中又改𦵏于奘公塔左貢士宋復撰書書亦是宋書之楚楚者而以復不顯故無稱猶恠銘首稱大周豈以法師死于武后朝耶因嘆武曌滛穢在唐以髙宗故不致削奪而后世猶不唾去之何也唐大徳進法師塔銘此太子司議陳光撰僧智詳書磨泐僅存形似然其書法亦是習登善者唐大徳檀法師塔銘此姜立祐撰而無書者名行草筆法圓健清逸當與建初大遍覺銘並觀唐净業禪師塔銘正字畢彦雄撰文而無書者名正書法亦習禇登善者勁㧞似之而其鈎磔處稍不及耳楊修齡侍御在長安日亟賞之遂多搨者唐張旭斷碑千文此云張旭書存者數十字牛鬼蛇神雖云竒怪然不堪大令一嗤唐張旭肚痛帖此帖殊勝斷碑千文十倍當與蔵真聖母三帖同觀唐草書心經刻后有䟦謂為右軍書非也王元羙考以為駙馬鄭萬鈞書張説為之序者見唐文粹又云書雖遒逸而踈縱不入格不中懐素作奴况右軍乎余觀此書筆法不似唐人逗入宋時蹊逕而説序萬鈞書曰學有傳癖書成草聖則萬鈞書自非孟浪者説深于文不應妄賛如此然則此書恐亦非萬鈞蹟也余又得心經序于報恩寺壁間唐南陽忠國師述宋九華山僧省言書書全出伯施㡬于亂真矣亟令摹一本装池于心經之首而藏之唐懐素蔵真律公帖蔵真律公共三帖宋㳺師雄刻之于石者所謂師㳺絲筆法也有驚蛇飛電之怳𣺌有挽強㧞山之氣力最竒筆也后刻諸䟦太半皆宜刪去李白歌贋作可咲尤為此帖之玷唐懐素聖母帖此帖輕逸圓轉㡬貫王氏之壘而㧞其赤幟矣亦元祐年刻刻手極佳與藏真律公帖俱不失素師筆意唐懐素草書千文此帖明成化間余肅敏公刻于石者書故横肆以刻手不良遂使素師婉轉清逸之趣十失其五所未亡者骨力耳視前二帖斯為下矣唐石柱題名柱八靣每靣為三段或四段曰左司郎中曰左司員外郎曰吏部郎中曰吏部員外郎曰司封郎中曰司封員外郎曰司勲郎中曰司勲員外郎曰考功郎中曰考功員外郎曰户部郎中曰户部員外郎曰度支郎中曰度支員外郎曰金部郎中曰金部員外郎曰倉部郎中曰倉部員外郎曰禮部郎中曰禮部員外郎曰祠部郎中曰祠郎員外郎曰膳部郎中曰膳部員外郎曰主客郎中曰主客員外郎按唐制二十四司以尚書左右氶領之左右司為之副此皆左丞之屬也題名不及左丞者自五品以下也十二司司各百餘人后題大中十二年十一月書鐫上石柱故自唐初迄宣宗諸名臣多在焉唐諸司官名或改或復或省或復置今不書所改者從舊制也書者不知為何人筆法出歐陽率更兼永興河南雖骨力不逮而法度森然盖唐世以書判取士顔元孫至以干禄命其字様故人多習書而歐虞禇薛一代前茅故人多用其法也柱今在西安府文廟門内唐兠率天經石幢一此書大有歐陽率更法志川宗尉掘地得之一字不損可玩也今石在志川府唐燃燈功徳經石幢一此書在香積寺行草亦勁逸然不中與王縉作奴唐尊勝呪石幢八余所收尊勝呪石幢凡八紙其一為張少悌行書清圓秀逸蘇靈芝軰不及也在崇仁寺經堂前以木柵罩之一字不損其一正書無名方整森嚴全習信本而結法稍不如在牛頭寺其六紙或正書或行書都不作惡扎然不無遜其腕力也唐尊勝陀羅尼經石幢十一凡石幢多書尊勝陀羅尼經余既有此癖遇必摩之而擇其佳者錄之凡所錄十一紙所在詳目錄中但其書法劉慎徽僧無可書者佳餘無名姓然皆與此匹敵者也闗中石幢無數或埋或斷或移作他用深為可恨唐石鼓經呪此以石為鼓而週刻之其文尊勝經呪也書遒徤有法存者不能強半鼓下作石山山上作天王鬼神以戴之斧鑿工甚竒在醒泉縣趙村廣濟寺后疑是唐初建寺時物寺僧不知護持鼓下為溷厠可慨也石墨鐫華巻四
