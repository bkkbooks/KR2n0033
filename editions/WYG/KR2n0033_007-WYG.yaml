body:
  text: 石墨鐫蕐卷七眀趙崡撰訪古逰記三首一逰終南余自髫年躭古法書沈右丞箕仲又謂余集帖數經臨摹其丰神無復存者獨漢唐古碑為可重耳余心是其言而罥足一隅以不能博收為恨今五十矣中夀余將就木焉其於腐肉朽骨何有且余最喜山水探竒攬勝又以不得同志為恨戊午夏四月作石墨鐫蕐示王㽒允濂允濂曰丈人于近道古碑恐有遺者寜可令歐陽脩趙眀誠諸君見乎因歴數所見數種余謝不敏要允濂欲與偕出從九􅉄而東逰城南遵太乙尋草堂道鄠杜允濂喜甚觧衣起舞曰是所願也遂治餱糧從長安呼一善搨者李守才至將發允濂又請曰丈人居近南山如重陽宫宗聖觀仙逰寺據勝地宜多古碑盍先一觀乎余頷之翌日乗二小馬搨工與二僕負楮墨從由南時村成道宫成道謂王重陽重陽名嚞成道于此有仙遺海棠花記記所㽜海棠活死人墓字出趙秉文書又道行諸碑皆不足觀南出得小逕望重陽宫樓閣出樹杪旭日初升谿水與林光相射不覺洒然至觀諸碑森立唯趙承㫖所書勑藏御服孫徳彧道行二碑可錄李道謙書教祖碑王元羙所稱精勁有法者暨姚燧書重陽仙跡碑次之蒙古字碑甚多多不能識元羙宛委餘編所載數字視此如石家珊瑚矣余為一詩已呼道士出所藏御服製以宫段正秋香色針工精宻可左右衽元服也此服賜孫徳彧者碑載甚眀𫝊者以為王重陽重陽金人成道後乆而元為之建宫安得服元服徳彧死𦵏南山墓曰孫真人神道碑存傳者又以為孫思􅊬皆殊可咲也余為一詩已至宫前龍虎殿猶元構木石粧塑皆非今所有丹堊銷沉左壁上方字數行余目不能逺視王㽒借一梯讀之云粧鑾功徳主本宫提舉孫道和曹漢臣塑胡君貴粧后題至順三年十二月三日字且漫滅遇余而顯亦三人者之幸也向使更數歳不復可尋矣因與王㽒歎慨者乆之翌日逰樓觀其上太史伯陽父與尹喜說五千言處為説經䑓其下唐開元帝夢老子得真容處為宗聖觀宜多唐以前碑今止靈應頌一碑頌真容事天寳間戴伋分書刻北面南面刻宗聖觀記唐人分書甚佳但經元人翻本减弱矣碑側蘇軾書詩并弟轍詩歳乆剥蝕元人别摹一碑法視碑側字亦减又貟半千撰碑分書亦翻本皆不大佳其餘如繋牛柏記文始殿碑殿壁間宋人諸詩又其下者余止令榻靈應頌碑而與㽒上紫雲樓樓壁間元人畫山水極竒偉二十年前尚亡恙今為亡頼子拭去題惡詩殊増懊恨獨七真殿壁金碧猶存竒偉不减樓壁間畫似出一手者既而摩石犀窺玉井登經臺由吕公洞攀顯靈巖䑓上米芾第一山大字趙孟頫𤣥元十子像賛疑皆摹刻又元人正篆二體道徳經皆不大佳而顯靈山新作𤣥武廟碑則余所撰余謂此山稱顯靈即老子真容出處不知何以貎𤣥帝謬甚語具碑中已從聞仙谷將還東至㑹靈觀觀側𦵏塔皆宋道士塔銘剥落不可讀觀中開元帝夢真容碑蘇靈芝書經翻刻余别收易州一碑亦靈芝書中載姓名與此小異而刻勝之碑陰蘇軾與章惇共逰題字亦遒逸時日薄暮隂雲四起亟鞭馬馳中途雨至衣盡沾濡王㽒衣單衣以一襆抱持所搨碑唯恐雨入殊有趙子固寳蘭亭之致余大咲為一詩翌日又逰仙逰寺寺傳是隋文帝避暑宫唐韓均平詩仙臺初見五城樓者即其地也今為寺入黒水谷五里萬山廻合仄徑依黒水而行大勝樓觀但剙造殿閣不及耳寺下潭曰黒龍停泓淵碧洞駴人心聞宋時每歳遣中使投金龍于中居人言昔深不可測今亦漸淺矣滄海為田當不誣也潭上架一木而過則馬季常之讀書洞史稱季常從京兆摯恂隠於南山之隂博通經籍豈即其地耶而殊偪側不可居不曉所出洞前玉女泉玉女謂秦弄玉與簫史吹簫於此仙去語近誕泉即蘓軾剖符所調水亦無他竒但經軾品題遂貴耳寺前小塔俗云逼水塔塔上唐人畫天王鬼神軾以為非呉道𤣥不能今画與軾題書世稱雙絶越泉洞而上高山障之有徑西出廻視殿閣參差山林掩映龍潭激流鴈塔高跱宛然董北苑筆盖山之勝至此殊絶矣余觀已與王㽒小坐寺中為一詩其他不及詩而歸是役也為日三得唐碑一元碑佳者三塔畫一蘇軾書字二翻刻唐碑二爲詩五言古二五言律一五言排律一二逰九􅉄既而将逰九􅉄求文皇附蟄諸臣碑憶馬嵬北五里有隋李使君碑余昔自奉天過㸔低回乆之恨無搨工遂渡渭先之馬嵬舟中指北芒阪上漢帝諸陵徃徃在目廢邱古城尤近短棹長波相為皷盪余興發以一詩寫之至馬嵬不及授餐詣碑碑𨽻書稍遜漢法而不甚闕獨闕使君名據碑云季父琰之琰之見魏書使君封安喜縣公官亦不卑而隋史無傳不可攷余爲一詩居人有以茗進者先置石蜜數匙于甌而注之甘苦相戰不曉何物余戯謂王㽒倪迂以糖㸃茶怒人不知其味倘飲此不稱善乎相視大咲翌日馬嵬人競携食過余索余書置墨如竈突烟筆如髠髮老而酒肉傖父雜坐於傍間以䆿語余爲連書數十紙頋視似閆立本内苑池上作畫時但對此曹差少羞澀耳是日欲爲馬嵬懐古詩意興殊惡翌日乃于馬上成之過延長寺抵儀門村訪苟子好善去昭陵漸近亭亭一峯已當吾馬首恨不即携謝眺驚人句朗吟其顛矣苟子者二十八舉於鄉余以白頭老子對之不覺靣慚爲一詩以贈是日即拉苟子至昭陵十里高生家高生名儼暨侄爾舟余故人先是余數語以昭陵冝有殘碑生已為問得數種以語余翌日携王㽒允濂苟子好善高生儼爾舟聮鑣而行北一里許得許洛仁碑碑書不大佳又北半里許得薛收碑似昭仁寺碑駸駸有伯施法折而西一里許為趙村村有廣濟寺寺後石鼓唐人書尊勝經呪精健絶倫止存十三攷長安志圖有石皷興宫而不言所以從趙村北行八里許為莊河村村中聞有一碑未至先于道傍冢得姜遐斷碑及至村觀碑則段志𤣥碑行間一牧羊兒云碑甚多余犒以金使導東行數十步田閒又橫一碑則監門將軍王君碑又東行數十步一碑無字亦無冢蓋土人平之而并磨其碑耳以圖攷疑是長孫無忌碑又東行半里許為劉洞村流水界之渡而東一碑則房梁公𤣥齡碑褚河南正書雖存者無幾而明珠寶玊片屑已足襲藏矣世但重褚河南聖教序而此碑則沈埋斷莽間悲哉又東數十步髙士廉碑在焉又東數百步李靖碑在焉撰書姓氏殘缺與諸碑同而上半完好靖冢作三山形文皇以象其功土人謂上三冢李勣冢亦如靖土人謂下三冢二冢南北相去不二里勣碑髙宗御書髙二丈餘嶄然屹立與温彦博碑搨者甚多土人捶其字殆盡彦博碑在靖碑北數十步歐陽詢書法視皇甫九成化度最為得中而不復可搨余為咨嗟者久之是日亭午餒甚就西峪村李氏市食李氏食余而返其值已小坐一廟東南望古冡相連碑甚多就之則禇亮碑阿史郍忠碑張後􅉙碑孔頴逹碑豆盧寛碑張阿難碑鱗次都不百歩書與段姜等碑皆有法而孔頴逹碑極類虞伯施但結構小踈昔人謂為伯施書非也頴逹卒在世南后不應世南作書當是習世南者書之然已優孟矣既而又得蘭陵公主碑于老軍營之西北得馬周碑于狗村之東得唐儉碑于小陽村之北碑既多佳余且觀且行搨工遂不相及余語諸君期以三日畢搨乃登昭陵皆曰諾方余之過荘河村觀段志𤣥碑也有趙生文奎村人也聞余至遣要余余謝不徃趙生則自追余西峪村余翌日至其家主食其鼎烹僕食其蔬粟馬食其蒭茭乆無倦色余遂安之為一詩而令王㽒擕搨工盡搨諸碑孔頴逹碑螭首嵌空處有至正四年三月顧游特㸔此碑墨書十二字積泥土中拭視如新是一竒也方搨而王生馬忽逸追之馬止處一碑仆地王㽒語余余募人起之乃崔相公敦禮碑大半完好是又一竒也余既不即行則為訪求殘碑仆者起之埋者出之存額者搨額尉遲敬徳碑自額以下埋土中聞十五年前令尹芮質田掘而搨數十紙余出之了無一字盖土人於芮君搨後棰而瘞之耳又山半數冡土人謂宰相墳仆一碑傳是魏鄭公碑山東半數冡土人謂亂冡坪仆二碑余皆起之則與尉遲碑同不知何年棰而仆之也余不勝嗟悼為一詩弔之又有告我以陵北四十五里叱干村有乙速孤公碑者余興欲飛趙生語余勿行是天将雨余恠之趙生指門前溪水謂余水縮雨徴也盖水從巴谷出村人鑿山引之灌田田皆畝一鍾而以其盈縮占雨甚騐余猶弗信已而陰雲忽起大風㧞木驟雨如注山谷應響水泉皆溢如秦王破王世充歸浴銕萬騎二十五将后從皷吹聲震長安中余亟爲短歌歌之以敵其勢翌日稍霽余與諸君乃上其道有二東曰御道稍平盖唐帝謁陵所由西道仄近莊河乃從西道土人謂有馬鞍險恐余不能過余至則履若平地然九􅉄中一峰為太宗𦵏處是曰昭陵高不敵終南一小峰而土人遂以為險絶真井鼃見也余既至峯下觀歴朝祭碑與翁仲或側或仆獨六馬皆以片石刻其半左右列各三攷歐陽詢書賛刻石殷仲容又書刻馬座今馬身半刻而無座字製亦不類唐人且太宗以天下全力豈難作一石馬而半刻之耶姑存以待博物者自此益斗絶余獨衣短衣而上王㽒先登余老力衰為之徐行苟子先至馬鞍山已悸不能置足余掖之至此益悸余又掖之相視而咲旣逹其巔則分東西二峯見地胍從崆峒来至此界以涇仲山嵯峩障其東涇出山后渭遶其前南則中南太乙亘若列屏平川一帶俯視無際長安萬戶城若彈丸矣巗半石洞藤蘿翳之所謂鑿石架閣以入棺者雨驟注不得至為一詩而下循山北行三十里為東莊村村人朴野而能食客但其地夏寒四月麥才一尺供具不偹客至便刲一羊不然則割雞相氏者高生儼婦翁也競以酒食来意甚殷余頷之是日午之叱干村村東二冡一為乙速孤昭祐碑苖神客撰釋行滿正書一爲乙速孤行儼碑劉憲撰白義晊分書地僻搨者少故得稍完亦幸已叱干村之西南又二十餘里豆盧村陳生庭譔慕余好古聞余至鞭馬觴余于叱干相見甚驩余即碑下爲滿引數觴鄭重而别是夜宿東莊寒甚余雖被酒猶覆二被視山南别一天地矣爲一詩翌日南行縁谿上下雨氣初開日光磨盪泉聲在耳山色映人興致殊佳為一詩遂由東道下谷口為烟霞洞傳爲鄭子真隠居處涇陽亦有谷口此去涇尤近而漢中又有谷口不知誰是余與王子苟子高子小坐樹下談子真事居人輙荅曰村無姓鄭者口占一絶句嗤之是日别高子抵儀門苟子宴余苟子三世同居白叟黄童一家滿坐殊令人媿羡翌日南過阿史村村亦有數大家因憶叱干豆盧阿史郍皆代北大姓而阿史郍豆盧諸人又有功于唐陪葬昭陵此必三族所居而無所考過此東望茂陵巋然壁上而衛霍諸將附焉想見武帝之盛登臨瀚海勒功燕然似不减李靖斥陰山擒頡利時而俗儒徃徃訾之殊爲可恨略而南阪盡得興平城城上于茂陵九􅉄則又皆在指顧中矣余不勝感慨為一詩而興平于子飬賢又為言其頖宫一碑亟徃觀乃隋賀若誼碑宋人磨其陰刻作夫子廟碑元文尚存十五聞昔㑹完好一縣令不耐嚴貴人之索耴棰其字過半云已又于崇寜寺壁間得隋常醜奴墓誌書雖不大佳唐以前物可存也是日徐眀府聞而邀余飲眀府巴縣人先大夫曾貳巴郡今墓木拱矣見眀府殊有風木之感眀府亦俊朗歡然道故余為一詩謝之而屬之賀若誼常醜奴二石乞置守焉翌日歸是役也爲日十四得隋碑二隋墓誌一唐碑二十石皷一尉遲恭杜淹李思摩順義公先妃陸氏清河公主碑額六爲詩五言古二七言古二七言律四五言律三七言絶二三逰城南歸自九􅉄之明日王㽒先歸長安余亦以他事不得即東又十餘日乃戒装至則王㽒有世母之喪余居逆旅以俟之意殊欝欝適張生衍祥来翌日與偕出安定門過演武塲逰崇仁寺本名崇聖建自隋唐今為秦邸香火院締構丹碧長安城諸寺不及也俗呼金勝寺經堂前有唐大徳檀法師塔銘姜立祐撰石幢尊勝神呪張少悌書皆殊絶余觀已小坐寺中先是王㽒告余以寺西一里許丁知州園掘得唐人墓誌使求之則園已易主誌磨為他用矣是時余居長安五日長安中諸好余者競携酒過余履錯于戶而王戶部堯年别余二十年則召余飲且出所藏古碑以贈余余得之而喜可知也又二日王㽒亦戒装携張茂中逰城南記偕余出永寜門永寜門西安之南門西安城本隋唐而狭小之記所謂安上啟夏含光諸門皆亡其故處今城四門東曰長樂西曰安定南曰永寜北曰安逺自永寜門至薦福寺三里許寺經廢徙非唐剙塔十五級嘉靖乙夘地震裂爲二癸亥地震復合無痕亦一竒也僧房閴􅄫多余舊主而余友臨潼楊師震獨買一院稱有髪頭陀居其中余曽數訪之今師震謝世且三年院中荒落不覺澘然為二詩以弔出寺南行又三里許為興善寺前據草塲坡所謂横岡之第五爻也雍錄長安志諸書皆云隋宇文愷築大興城以城中有六大坡象乾六爻于九二置宫室九三置百司九五貴位不欲人居置𤣥都觀大興善寺以鎮之觀當在寺西寺東又有裴度宅張權輿所謂宅據乾崗者今觀與宅皆廢獨寺存寺后閣巍然銅佛像并轉經藏疑皆昔時物閣前有唐大徳禪師碑額閣上有故按察劉公餘澤詩按察與余最善讀之慘然為一詩以弔出寺東南行又三里許為慈㤙寺據記云寺經廢毁殆盡惟一塔儼然則今寺亦非唐剏而塔自宋熈寜火后不可登萬歴甲辰重加脩飭施梯始得至其顛秦山涇渭皆入目中余賦一詩求記所謂唐人墨蹟孟郊舒元輿之類皆不可得塔下四門以石為桄桄上唐畫佛像精絶為逰人刻名侵蝕可恨東西兩龕禇遂良書聖教序記尚完好而唐人題名碑刻無一存者問之僧云塔前元有碑亭乙夘地震塔嵿墜􅐦為碎叚今亡矣又按唐史高宗御製并書慈㤙寺碑𤣥奘迎置寺中導從以天竺法儀其徒甚盛上御安福門觀之記又謂寺西南一里有李晟先廟碑張彧撰韓秀弼書今二碑皆亡寺前小渠曲江泉合黄渠水經鮑陂而西聞二十年前尚有水宗侯誼汜塋在其北引水作池忌者塞其泉竭矣由寺東南行一里即曲江西㟁江形委曲可指皆蒔禾稼江南㟁王中丞琁構亭逰賞今亦傾圯江正北一阜故樂逰原今為永興王府塋原下舊有青龍寺今亦毁江頭古冡隆起數處疑非冡當是唐宫殿基杏園芙蓉池皆在江西南今不可考余停望乆之爲一詩記又謂其西北有楊尚書瑒廟碑李林甫撰王曽書令狐氏廟碑劉禹錫撰并書今皆亡獨其地呼廟坡頭如故又東南二里為漢宣帝杜陵下為三趙村村中小冡鱗比疑皆帝從𦵏者又東南五里為張曲記謂有蕭嵩墓今數冡未知誰是盖由曲江逹張曲地漸高望之自東南一帶迤邐過長安西南皆所謂少陵原也本鳳棲原以宣帝葬許后起少陵遂曰少陵少陵在司馬村東其西皆秦王葬地松栢森蔚華表翁仲數十里相望焉據記張曲之西趙村有論弓仁墓張說為碑已斷仆無字今亡村中有石翁仲二疑是仁墓上物趙村西為高望有蕭嵩父灌墓碑張說撰梁升卿書高望之西北又有仇士良郭敬之昇平公主三碑皆當在十餘里内余欲徃尋之王㽒曰亡矣乃遂東南行至龎㽜宿王㽒庄庄西半里為秦恵王墓墓前掘得叚府君碑碑字皆平隠隠可讀乃唐段志𤣥父也碑額字亦漸平細如處州縉雲碑似是石理漸長歐陽永叔言不誣耳是日大雨翌日霽西南行馬首净無纎塵山光林影紫翠相暎殊不减山陰道上行五里原盡得興教寺據高原俯樊川玉案山天池寺在其南韋趙三像院在其東韋杜華嚴諸寺在其西神禾原道安洞慧炬寺横亘其西南余與王㽒坐寺門眺望為一詩逰塔院觀三藏慈㤙西明三塔三藏銘劉軻撰慈㤙銘李𢎞度撰俱建初書西明銘宋復撰書吕大防所創玉峰軒以玉案得名當在寺后原半今獨陳正舉所為記在殿壁間寺僧有穴居者壁間嵌古殿壁一片唐人畫地獄變相止存閆羅王一鬼三大不盈尺而狰獰之状駭人心目亦一竒也下寺渡潏水尋道安洞葬塔半傾寺亦寥落道安事無考有金人所為碑獨叙安生平而不及洞所始但至此西倚高崖東眺樊南之景舉目可盡茂中言不虗也又東南行過鄭家庄唐鄭駙馬乾曜後族尚百人據記鄭氏居蓮花洞在道安洞西北今乃在東南豈年乆遷徙耶似不可曉自此南行抵南山普光寺寺有二一在山下一在山上下寺金碧莊嚴爲長安諸寺之冠即崇仁不及也最勝者寺門内蓮花池大數畆中作藏經閣環以廊百楹逰人至此恍然有出世想上寺距下寺五里石蹬參差飛梁跨壑長松古栢翠壁蒼巖應接不暇而莊嚴則减下寺攷寺直玉案山北是故龍池寺東北坡上有曇逺禪師塔記云上興教寺玉峰軒南望龍池廢寺則寺自宋已廢國初有無壊禪師者西方人與秦愍王有宿世縁卓錫至此山夜擊木魚聲逹王宫王異之明日来見師與語王恍然悟前生事命席禮師師携石甑炊餅石礶煮水飲食王從者數千人皆給王乃即此山為起寺居之竟證圎􅄫師所遺禪衣錫杖并甑礶見存余得寓目焉寺僧又為余言師化后又有一西僧貎類師来逰於此踪跡詭異或與食食無筭或累日不食或飲之酒不醉或自遺矢傾食中并食之一居士欲從之逰僧指矢令食居士有難色僧笑而舍之去后所遺矢處輒生白蓮花僧殆亦無壊之流也惜無所遇云余既逰二寺與王㽒宿奉長老房為普光寺并觀無壊禪師衣物二詩翌日西北行循神禾原過慧炬寺荒落特甚下原徑杜固有水西北流當是杜正倫所鑿尚名鳳凰嘴自此稍西行為杜曲懐子羙為一詩又西北為楊萬坡夏侯村上華嚴寺丹碧雕殘記謂有澄襟院有東閣有元醫之居引水架閣頗極幽勝今獨㫁崖敗壁而已而倚髙原瞰太乙諸山粲在目前則猶昔也寺西二塔不知誰為眞如寺僧言昔有五塔止存二余觀東一塔下有杜順禪師像西一塔為清凉國師妙覺塔俱經重修敗垣中有唐比丘圎滿㫁碑書雅有歐禇法又一僧房有唐儼尊者塔額大字又有夢英撰碑何潤之書記文殊閣藏杜順肉身今亡所在而杜順和尚碑不知何縁乃在長安開佛寺中余與王㽒觀已因歎地之興衰如記稱龍池廢寺即今普光剏造為諸寺冠而華嚴寺之勝十不存一二焉為一詩而下循原西行數里有宗尉懐斛庄亭館參差出半山林木掩暎水泉稲畦極幽僻之致懐斛者懐􅀈弟也懐􅀈字長房博學能詩文與余善恨不拉此君開樽暢飲其上也為一詩而過又西二里為牛頭寺寺地勝如華嚴而莊嚴過之盖亦秦邸香火院也寺有徐士龍撰碑今亡余為一詩自寺西南行過申店渡潏水西北望皇子陂大冡其西為畢原下為杜城何氏山林逍遥公讀書䑓岑嘉州諸莊俱無所考佇望乆之西南過神禾原十里為香積寺樊川御宿之水交流其下謂之交水西合于澧入於渭亦一勝地也寺塔中裂院宇荒凉寺前壁上有畢彦雄撰凈業禪師塔銘書虬徤有登善法寺僧言是塔上墜落者是夜宿寺之西廊與王㽒指寺北汾陽破安賊時長刀斫陳鳥獸皆駭今獨有鬼火佛燈而已為一詩翌日渡交水東南行十里得胡村寺原名寳際寺壁間有進法師塔銘是日小雨少憇寺中又東南五里為百塔寺本信行禪師塔院山畔唐裴行儉妻厙狄氏葬塔尚存餘小塔記所謂纍纍相比謂之百塔者今止存三五而已殿前石幢經無可書殊絶寺亦入秦邸故莊嚴稍勝殿壁金元舊畵雄偉可觀寺僧又出一像紗㡌金龍紅袍云得之承塵意是金元逹官修寺者像也余為一詩而下至此東望普光僅十五里所謂南五䑓者曰觀音曰靈應曰文殊曰普賢曰現身皆山峰卓立樓殿出半天在普光之西南百塔之東南而道塞多猛獸不易至每嵗六月奠禱雲集秦邸人縁道設飲食以待之乃可遊焉余望之悵然循山西行林中多柿栗其隂蔽日又十五里為子午鎭直子午谷北有日中之市市多山珍長安人徃徃就之南望谷口殊險因憶魏延欲以精兵五千自子午薄長安此去褒斜千里首尾不相救縱走夏侯懋豈能當曺㪫張郃歩騎五萬耶眞妄言也鎮西十五里為董村寺是翠㣲下院山上寺為翠微余不得至呼寺僧問之不知也余與王㽒相視而笑壁間金牒歴載諸寺化度寺猶存思率更邕禅師塔銘不勝慨嘆又西十里為觀音山竒峭與衆山殊大壑精氣出入令人駭目又西十里為豐谷豐水為八水之一而谷口僅􅂾十歩亂石夾水北流殊非大浸稍北合髙觀水交水始大耳水上橋以銕絙二繫大石横以版履之動揺欲飛又西一里許為髙觀谷谷水注一大石鏬曰髙觀潭濆沫如雷上有銕絙懸橋如豐谷而潭水激射度者尤悸髙觀谷之西則草堂寺也秦姚興迎鳩摩羅什譯經於此原名逍遥園唐僧宗宻居之為草堂寺今名棲禪寺有鳩摩羅什葬舍利石塔精殊甚宋人作亭覆之今尚在傍有龍井云與髙觀潭通未知的否殿后有圭峰定慧禪師碑柳公權篆裴休譔書圭峰定慧禪師者宗宻也壁間又有隋鄭州刺史李淵為子世民祈願記淵唐髙祖世民太宗也又有章惇蔡京題記皆歴歴可讀寺前揖紫閣峰東觀音山西圭峰如屛環而圭峯獨壁立亦曰笄頭山又曰鷄頭十六國春秋云石生兵敗潜鷄頭山是也寺南一里有寺曰長興秦邸剙又西南三里有寺曰子房庒則僧大海創以譯經俗謂留侯尋黄石公於此非是當由紫閣訛為子房好事者貌留侯可笑也東南一小峰峰頂有寺曰圭峰寺四寺惟棲禪最古而莊嚴都不及長興余二十餘年三遊其地乙未同逰為羅貢士秀士魏茂才邦逹韓進士期維癸卯同遊為王戸部家瑞王明府宣徐孝㢘汝為韓孝㢘化張茂才自守數君子者獨羅秀士仕為浙叅軍餘皆物故而余亦斑白記余初遊時棲禪殿壁畵猶前朝筆甚竒偉今㫁裂矣僧大海多長者遊善談論今圓寂矣其徒皆無足與言者圭峰寺僧松菴架閣巗居甚有幽致今僧化而閣廢矣獨長興以秦邸修繕如故余語王㽒不勝今昔存亡之感是夜宿棲禪寺為一詩以弔翌日王㽒辭余東歸余亦西歸是行也為日十三得隋記一唐碑三塔銘六石幢經佳者二宋碑一記三唐碑額三為詩五言古四七言古三五言律五七言律三石墨鐫華卷七
