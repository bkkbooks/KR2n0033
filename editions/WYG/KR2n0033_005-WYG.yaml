body:
  text: 石墨鐫華卷五明趙崡撰䟦四十一首宋藍田縣修夫子廟碑孫穆之者宰是邑重修夫子廟而進士董儲為之記僧嗣端書董文靡弱殊無足採嗣端分𨽻則深得唐人遺法者後署大中祥符四年皇帝祀汾隂之月攷史為二月是時契丹嵗幣三十萬而水發徐兖旱連江淮無為烈風金陵大火災異之見大書不一書而帝方且侈天書之瑞尋漢武唐明之蹟無怪其後世之不振也宋修唐太宗廟碑宋承五季文靡極矣此李瑩奉勑為之者猥冗不稱孫崇望書全出吳通㣲昔人謂之院體院體即如今所謂中書體盖誚之也余謂通微書清逸有法得聖教少許結構便足名家崇望猶是通微之亞然在宋初可謂歩趋唐法者矣據碑太祖于時修厯代陵廟而元羙題唐憲宗廟碑謂懲于藩鎮故注意憲宗憲宗廟碑與此碑俱開寳六年立元羙偶未見耳宋刻昭陵六馬圖賛六馬賛唐文皇御製歐陽詢書石與文徳皇后碑同立陵后髙宗又詔殷仲容别題馬賛于石座則賛宜有歐殷二公書也今文徳皇后碑與歐書都亡而陵上馬無石座書世所傳圖乃游景叔所刻景叔序云得唐陵圖記云然楊用修丹鉛録記六馬賛云在秦中殷仲容撰歐陽詢書又有元學士王惲䟦云云其説與景叔小異或用修所見乃舊石耶然一為歐書刻石一為殷書刻馬座寔出太宗製非殷撰而歐書也游公刻圖盛傳用修不當未見何抵梧乃爾今去用修未百年豈舊石頓亡獨有游公刻耶景叔亦云詢書不復見獨殷書存距陵北五里今石馬正在陵下不數十武又無座書其非唐馬無疑然則殷書宋時尚在今亦淪沒不可求矣非游公刻圖誰其知之公又云殷書薛仁杲作仁果以証史官之誤如此類者尚多游公雅善臨池李靖李勣碑隂各有題字草行甚佳而此圖序乃醴泉縣尉刁玠正書深得歐陽詢遺意者可觀也宋譯三蔵聖教序西域僧天息災譯三蔵太宗為序雲勝書天息災無𤣥奘師之竒異太宗無唐文皇之雄才雲勝無懐仁之手腕又無王逸少之殘墨斷楮足供其補綴時代既非不能超乘而上矣后之為不朽者難哉宋北岳安天聖帝碑真宗既封㤗山祀汾隂而褒及恒山之神也陳彭年故非端人語多容媚邢守元書亦習聖教而有得者但結體太踈倘遇王縉便當避三舍矣矧右軍乎宋重修北岳記碑嘗見王元羙稱是碑云魏公書法顔平原而時時露栁骨鋒距四出令人不敢正視亟慕而購求之既得再閲所謂鋒距四出良是但以三公較之似不無少遜顔之方整而偏得栁之奮張居顔栁間可也何至兼二公令人不敢正視乎魏公受遺二世以身繋重輕誠不可及而于書家嫡派恐不敢過枉也宋勸慎刑文碑此宋晁逈述自古酷吏循吏之報應以為用刑者勸文冗似㸃鬼而書方整勁㧞有歐陽率更法稍遜其遒逸耳碑無書者姓名以后慎刑箴碑証之當為盧經書宋勸慎刑箴碑迥既作慎刑文又為是箴刻石永興軍文宣王廟即今西安府學碑立于天聖中是時迥判西京已年八十餘矣召宴太清樓既而獻斧扆慎刑箴是此耶中多為長吏語似非上天子者迥為殿中丞時失入死囚奪二秩故晚年津津慎刑如此耳書碑者進士盧經大有歐法并可存也宋清净䕶命得道經此碑首清净經次消灾䕶命經次生天得道經書者始平龎仁顯全習皇甫碑法虬健絶倫寘之唐人名書中殆不可復辨但經首乃作菩薩盡像何也宋摩利支天幷隂符經此碑首摩利支天經前作佛像次黄帝隂符經前作黄帝問道廣成子像畫俱不惡書者為汝南袁正巳亦能習歐陽率更法者因以見宋初諸人猶歩趋唐矩也宋郭忠恕三體隂符經忠恕三體隂符經其二大小篆其一𨽻也忠恕篆筆匹徐鉉而誚英公又兼工小楷畫品入妙其后又能仙去不死真異人也余不得見其小楷與畫而于是碑亦足以窺其一班矣宋篆書千字文序英公于篆書獨推李監而陶承㫖穀此序亦云陽氷死而夢英生其然乎序書出皇甫儼手可謂升率更之堂者宋夢英篆書千字文英書全學李監未似孫敖而袁正巳𨽻書方勁有歐法與隂符經同非嘉祐以后人所及也宋夢英十八體書黄魯直云李龍眠得金銅㦸于市漢製也􅅺金六字字家不能讀蟲書妙絕于今諸家未見此一種乃知唐𤣥度僧夢英皆妄作耳然則今所傳十八體出英公杜撰欺世非古寔有之也音釋分𨽻頗有批法碑首載贈詩正書亦勁健皆是英公手耶如此公亦非孟浪者矣宋夢英偏傍篆字夢英在宋初自負篆書故作偏傍字源書而著䟦于后大要干李斯諸人皆加貶駁獨推重李陽冰耳而不免為后世吾子行所譏至謂無所師承即郭忠恕與之同時英所推轂今觀其報書云何人知之惟英公知之似含不足之意英豈為不解也者附其書于䟦后何也但其書䟦語書忠恕書俱正書大有信本皇甫碑法始知十八體釋文幷贈詩都出其手毋疑也余合數碑觀英公書似當以正書第一篆次之分𨽻又次之不知具眼者謂之何宋夢英夫子廟堂碑英于篆體偏傍二石皆繋䟦語與忠恕書皆作正書皆方勁有法而此碑忽爾蹶張全用栁誠懸𤣥秘塔法不師其遒勁而師其粗踈所謂真惡札也米南宮可作請以是質之宋登太山謝天書碑帝既侈言天書之妄復為太山之封而作此銘述太祖太宗以及其身語多浮誇文亦拖㳫正書僅能方正無少鈎磔想帝亦不能辦此或王旦軰為之潤色而尹熈古之流握管耳碑方廣㡬埒開元帝太山銘字减小不能強半而文筆手腕則不啻泰山之于鄒嶧矣宋華嚴寺文殊閣碑閣是杜順禪師藏肉身處宋人重修英公為記何潤之書英公文靡弱但公自任篆書者其正書極佳乃使潤之書潤之行筆亦不惡結體踈耳未足辱吾寳藏也宋興平縣保寜寺碑知遵鑄鐘建樓亦僧臘能事本不足多冉曽為碑為書盖其徒張大之耳曾文有五季之靡而真行精健大有聖教序法是宋書中之錚錚者宋𤣥聖文宣王賛此真宗東封還過曲阜奠孔子而作碑二方上刻御製賛下刻加號詔真行書無名氏疑亦書院待詔尹熈古軰為之雖不離院體而亦有聖教遺意據碑奉勅諸道府州監各于文宣王廟刻賛幷詔不止曲阜余所收乃曲阜碑盖他處易燬而孔林獨存耳宋修兖州文宣王廟碑呂文穆廷試第一後為賢相此文殊弱不稱白崇矩書大似孫崇望而遜其圓逸二人皆以書待詔者見一時所尚如此宋玉峰軒記呂大防緫管永興軍創軒于興教寺陳正舉為之記大防名在青史與弟大忠等考禮定約至今傳藍田呂氏鄉約不替獨以軒以記哉今軒已亡記猶在寺壁文與書俱不足稱也宋三十六峰賦四明樓异令嵩髙賦少室賦不足道而書者為武林僧參寥極得坡公卧筆法遒勁古雅即令坡公見之亦當首肯宋絳州夫子廟碑聖教序盖唐文皇從右軍墨蹟集之而又獲懐仁善手故能師法百代此碑從刻本摹集僅形似耳無論不及聖教即以較吳文斷碑又隔一塵矣宋于真菴記此徽宗為道士于元隠羽化作都轉運使任諒撰記而集唐歐虞禇薛顔栁李陽氷諸書者也亡國之君尚虚無而忘政治無足言者其書歐虞禇居十之七顔栁薛才間出或以顔栁字大不論薛書少故耳李則獨以篆額集刻俱善但書而百衲殊不足觀存之以備一種宋集右軍牡丹詩牡丹詩較絳州碑差覺風流而老勁處不如時有一二筆纒綿者右軍帖中亡此也宋普濟禪院碑碑在汧陽于侍御永清始獲之亟稱賞以為不减聖教余得一紙觀其書非惟不及聖教抑且不及隆闡法師碑時代為之非書者責也書者為僧善儁署曰習晋右將軍王羲之書其年為大中祥符此時蘓黄四家未出故書雖遜古猶有唐風宋承天觀碑觀在真寜縣唐開元中建宋大中祥符中奉勅重修而尹熈古書之者也熈古書院待詔書正與汧陽普濟碑同而此出隆闡碑為多碑稱剏造之由開元帝夢羣仙使求之得石象二十七于此事與𤣥元極類攷唐地理志縣本名羅川以得石象故改真寜云宋刻僧彦修草書彦修草字詩李丕緒刻之于石曰筆力遒勁得張旭法今觀其書殊無一筆似張長史者王元羙曰如淮隂惡少年風狂跳踉良是宋抄髙僧傳序陶承㫖文全乏蘊藉英太師書徒爾矜張俱非當家善乎元羙氏之言曰陶法門之畫葫蘆者英筆塚之盗枯骨者蔑以易矣宋僧静已書偈語碑此與抄髙僧傳序碑幷在西安府學俗幷呼抄髙僧𫝊余視之乃某禪師所述偈語語非上乘而書出僧静已行草甚類英太師嶷二碑同時建静已英之徒也然不免惡扎宋修周武王廟碑此盧多遜撰孫崇望行書亦開寳六年建蓋與唐太宗廟同時修葺者廟近王陵今廢圯碑不知何時移咸陽城中宋修周康王廟碑宋祖葺前代帝王寢廟文武成康皆有之今碑存者獨成康耳而康王碑斷泐不可讀開寳六年建黄遜浮撰孫崇望行書亦與唐太宗廟碑同時而王元羙題憲宗廟碑謂宋祖注意憲宗盖未見周成康唐太宗諸碑耳崇望待詔書院者一時習尚故不離通㣲院體也宋修唐憲宗廟碑余收宋祖修古帝王廟碑周文武唐太宗暨此凢四而此最后得趙闕撰張仁愿書仁愿與孫崇望白崇矩尹熈古皆待詔書院王元羙所謂文與書俱拖㳫不足觀者但宋祖以談笑得天下而于古帝王陵廟盡加崇餙忠厚開國規模𢎞逺矣其事在開寳六年未㡬鼎成使得竟其志幽燕何足煩一舉也惜也宋贈夢英大師詩贈英公詩者三十餘人陶糓宋白蘇易簡郭忠恕諸人皆在其中而備諸惡道無一首合作宋初人口語如此無論初盛何可令許渾見也書手出廬岳僧正䝉得誠懸法以英公廟堂碑觀是其相知之深者故欲有効于英耳詩中書劉伶作劉靈宋太平興國宮碑有神降于鳯翔本無稽之言而侈大之其天書之前茅乎徐常侍文纎靡直是五季遺習張振書亦拖㳫不堪與孫崇望雁行宋同州龍興寺塔碑寺建自隋而重修于宋開寳之末檀那楊繼宗也碑内有云府主連帥太師者有曰通揔隴右公者有曰觀風譙郡夏侯公者皆不可攷作碑者名岵而不言其姓亦無從知之書者并無姓名書法率更方整有之遒逸不如也宋復唯識廨院記唯識廨院者藍田故龍泉寺也有洪集者與姚氏共復之而為之碑碑文寥落耳書或正或行或草或兼一二筆小篆分𨽻其草又時作渇筆極竒怪遒偉似魯公誠縣而時復出入但記者為豫章黄闕其名書者為瑯琊元闕其姓名二字題額者為鄭闕其名立石者為大雅闕其姓諸人名姓無一全者獨刻者張遵姓名亡恙人固有幸不幸哉宋賜西岳廟乳香碑髙紳轉運荆湖奏請勑賜南岳焚香而四岳并及之據碑南岳諸殿日破乳香一兩西岳諸殿共十一處乃日破半兩古人焚香其儉如此且所焚乳香非今香也碑正書亦有栁誠懸筆意宋樞宻趙瞻碑趙懿簡公瞻敝邑人卒葬城南四里塋地為耕者所侵殆盡碑仆而泐僅有數十字可辨觀其書法勁徤知書撰人必非沒沒者惜先逹為敝邑志不收其文遂無所攷為之一慨宋游師雄墓志游公表章古蹟自周秦以及唐無不有題識至今尚存焉志亦云然志多與史合盖修史時采志語入也志張舜民撰頗盡闡揚之致書者邵䶵清圓秀勁大足名家所可恨者傷佻耳其書只尺作只赤赤與尺通楊用修以尺牘為赤牘本之禽經雉上有丈鷃上有赤王元羙又引華山石闕云髙二丈二赤平等寺碑云髙二丈八赤而疑其隐僻欲改作尺牘據此志則宋已多用之非僻也石墨鐫華巻五
