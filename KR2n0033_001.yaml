body:
  text: 石墨鐫華卷一明趙崡撰跋三十六首夏禹衡嶽碑二種禹碑七十七字在衡嶽雲密峰楊用修得之張僉憲云宋嘉定中何致子一遊南嶽脫其文刻於嶽麓書院用修又刻於滇中安寧州近世楊時喬又刻於棲霞山天開巗余所收二本其一稍泐跋數十字尤不可辨隱隱有何致字當是子一舊本其一則楊時喬刻也用修謂韓愈劉禹錫朱熹張栻諸人求之不得而已得之以為竒幸而王元美復疑之謂銘詞未諧聖經類汲冡穆天子語何也用修金石古文并楊時喬皆注𨽻釋互有不同元美亦有二本釋亦不同時喬本出在元美后元美所得豈即何子一楊用修二刻耶何其抵牾同也但其文所謂龍畫螺書鸞漂鳯泊雖經摩刻猶可想見古人惜不得衡嶽石上迹耳周武王銅盤銘此文元延祐間摩汝帖刻于石者辭旨簡逺雖非原物亦可重也周穆王壇山刻石吉日癸巳字在壇山宋宋祁尋而摩之縣令劉莊鑿取歸州權郡事李中祐龕置廳事右壁而為之跋國朝宋濓考據款識以為周穆王書亡疑而宋人施宿乃謂州廨舊石以政和五年取入內府然則濓所見余所録豈后人拓本耶濓曽摩刻浦陽山房仍自為跋余本有李跋無宋跋又非宋本不可曉周宣王石鼓文鼓文出入雅頌書法淳質出周宣王時史籕筆亡疑都玄敬楊用修王元美諸人辨之已詳余借得一本雖磨泐特甚真三代物也古人有以為秦物者已非又有以為宇文周物者尤可笑歐陽公最號博雅乃亦疑之遂令後人譏駁無地自容矣今石猶在太學門內余從李典籍又覔得此本漫滅視余借本尤甚而護持無人惜哉周仲尼比干墓題字此書程邈李斯之所不為而曰仲尼手書洪氏𨽻釋漢𨽻字源辨其謬矣然以比干忠烈尼父是其族孫姑妄信之亦足為忠臣吐氣也周仲尼季札墓題字此書流傳已久故陶淵眀季札讃云夫子戻止爰詔作銘唐張從申云舊石湮滅玄宗命殷仲容模拓大厯中蕭定重刻于石又有謂李陽冰學嶧山碑得此而後變化者據此數説則真仲尼書也歐陽公疑仲尼未嘗至吳且其字大非古簡牘所宜又有謂原字止曰嗚呼有吳君子而延陵之墓四字後世妄增即黃長睿董廣川皆以為疑卒未有敢定其真偽者但淳化帖所收字小而鎮江石刻字大不倫不曉何故姑存之以俟博識君子秦嶧山刻石二種唐封演謂魏太武登山排倒此碑然猶模拓者多邑人疲於奔命聚薪焚之有縣宰取舊文勒于石其后徐鉉得模本鄭文寶刻于長安自此刻者甚衆評者謂長安第一鄒縣最下而杜甫詩又云嶧山之碑野火焚棗木傳刻肥失真據此數説則嶧山舊石亡在開元之前其翻本或以石或以木矣則未知鉉所録者縣令所刻石耶抑即肥失真之木耶而鉉自謂得思於天人之際何也余所收二本一為鄭文寶本正臨自鉉者僅存形似無復神情其一本則至元間翻刻據跋元祐中縣令張文仲又刻之矣此又當居文寶本之下原文二段後假乃二世詔文都玄敬謂宜在石之傍文寶誤録為一而至元刻跋以為皆二世頌始皇語尤可笑漢五鳯二年殘字此石金髙德裔修孔廟掘得之太子釣魚池中池在靈光殿基南三十步太子者景帝子劉餘封魯故俗以太子呼之也石曰五鳯二年宣帝號也又曰魯三十四年德裔以為餘孫孝王時也又曰六月四日成者必當時創建或鑿池而記其成功之日也西漢石刻傳者極少此字簡質古朴存之以示後人漢泰山都尉孔宙碑宙融之父孔子十九代孫也卒以延熹六年碑造于七年而趙明誠歐陽永叔王元美皆曰四年宙字季將𨽻書易辨而永叔集一作秀持皆不知何據鄭漁仲金石略又載兩孔宙碑尤謬余借得東肇商本又得二紙于王户部堯年趙郡丞可行大都殘闕過玄敬所録者猶精彩動人元美乃謂文與書皆非至者何也又有宙碑隂門生故吏名余未得見據金石録有捕巡字升臺捕姓姓苑不載而其稱謂有門生門童弟子故吏故民之不同洪丞相適謂親受業曰弟子相傳授曰門生未冠曰門童椽屬曰故吏占籍曰故民因是異聞附著之漢魯相置孔子廟卒史碑此碑都少卿玄敬考據始末甚明楊用修金石古文全録之但碑中奏洛陽宫下有司徒公河南闕字季髙司空公蜀郡武都闕字意伯二十四字內闕六字而二公不之及都云此碑殘闕據宋洪丞相𨽻釋録其全文而竟遺此豈二公但憑抄録未見拓本耶碑後又有刻云後漢鍾太尉書宋嘉祐七年張稚圭按圖題記按此碑永興元年造元常獻帝初始為黃門侍郎距永興且四十年此非元常書明甚未知張稚圭所按何圖其敘事簡古𨽻法遒逸令人想見漢人風采政不必附會元常也碑中趙戒范史注字志伯今云意伯趙明誠云疑是避桓帝諱戒袁宏又作誡漢韓勑造孔子廟禮器碑此碑都楊二公録闕七字而余所獲拓本止闕五字多一皇戲統華胥戲字一以俟知奧奧字二公前余八十年都所收又云舊拓本而闕字反見於今何也且都録碑隂謂𨽻釋所載六十二人較都家舊拓本闕三十八人𨽻釋始曲成侯王皓終洛陽王敬都家本始涿郡太守魯麃次公終河南樊文髙按碑文韓明府下已列頴川長社王玄君真至相史魯周乾伯德八人似不應碑隂重録𨽻釋首正少此八人于漢文簡古之體為合而都本乃重出不知何故惜不得至碑所一證之至若碑𨽻書與卒史碑無二且記法簡質非今所能而玄敬乃以雜用讖緯薄之余竊不取焉漢魯相史晨孔子廟碑此史晨上尚書奏章蓋漢制郡國因尚書以逹天子如今通政司事也晨初到官自出俸錢以供禋祀可謂知尊聖人矣漢魯相史晨孔子廟碑又一碑紀晨姓字載當時廟享觀禮者九百七人復修瀆置井及守墓人可謂盛事余所收二碑在漢碑中頗為完好前碑止缺十一字後碑止缺一字按都玄敬與楊用修所録前碑缺二字而後碑乃缺三字且前碑上尚書後有時副言大傅大尉司徒司空大司農府治所部從事等二十字而都楊本俱無之後碑又較二公多一望見闕觀觀字一享獻之薦薦字豈都公所收偶是缺壞本楊公又從都公書中抄録不及以碑證耶余生後二公而得見所未見為之一快漢北海相景君碑此碑殘缺幾不成文考集古録蓋自歐陽永叔時已然而都玄敬乃録其全文止缺三十字不知何據玄敬又云家藏漢碑不完者皆以洪丞相𨽻釋足之此是耶王元美曰𨽻法故自古雅但益州部當言刺史不當言太守額曰銘辭曰誄亦屬未妥東京作者往往如是而碑中睂夀作麋夀歐公以為古字通用良是漢淳于長夏承碑都玄敬引證極博大略以此碑自元王文定公惲定為蔡雍書謂其氣凌百代筆陳堂堂洪丞相𨽻釋謂其字體竒怪鄭僑書衡謂其兼篆體八分合數説而疑碑非真迹又云江隂徐擴有舊刻闕字四十有五此獨完好則其偽始信余亦覔得一紙非漢刻似不待辨而楊用修謂為漢刻之僅存者王元美亦云其𨽻法時時有篆籕筆骨氣洞逹精彩飛動非中郎不能豈所見别一碑耶漢郭有道碑此碑在介休縣余邑人王正巳曾為其縣令余從其家覔一紙乃正巳重刻者深恨不得原刻近有晉人為余言舊石曾在一秀才極愛之每往碑下摩挲纍日一夕盜碑舁去縣令無奈重刻一石以應求者後又磨泐而王正巳再刻之秀才所盜之石竟不得出異哉漢李翕折里橋郙閣銘此碑在略陽相傳為蔡雍書馬伯循信之固未的然碑文醳散關之􅢉漯徙朝陽之平慘歐陽公以為疑董逌書跋云顯古文顯字漯川漢作顯讀謂川在卑濕書學古文至今同古文字濕作又作􅀈故漢人濕又作纍然則漯當作濕噪與叄同體故古文燥作慘其言醳與易同卜用醳亦易也楊用修謂醳古與釋通漯借作濕慘與燥同解作去濕就燥之義蓋本董説但碑文磨泐歐陽謂二句適完好今亦損過半矣又碑中太守李君諱翕字伯都今板本皆作李會或傳寫之誤唯鄭樵略曰李翕與碑合漢郃陽令曹全碑萬歷初郃陽縣舊城掘得此碑中平二年造內稱全為戊部司馬征疏勒王和德攻城野戰謀若湧泉威牟諸賁和德面縛歸死還師振旅諸國禮遺且二百萬悉以簿官按范史西域傳和德射殺其王自立涼州刺史孟他遣從事任涉將燉煌兵五百人與戊巳司馬曹寬西域長史張宴將諸國兵合三萬人討疏勒攻楨中城四十餘日不能下引去二説不合且司馬為曹寬非曹全豈即其人范史傳寫誤耶即紀功者張大其詞而面縛歸死似非虗飾抑又何也碑又稱光和七年史光和止六年蓋七年冬十一月始改元中平耳碑文𨽻書遒古不減卒史韓勑等碑且完好無一字缺壞真可寶也余曽與友人論及古碑友人曰吾輩幸生此時猶得見漢晉人書恐後世無復存者余曰神物顯晦有時寧無沉埋以待後死者如曹全碑歐陽公趙明誠都玄敬楊用修諸公豈得見哉相視一笑漢西嶽華山廟碑漢魏碑例不著書刻人姓名獨此題郭香察書為異洪適𨽻釋云東漢循王莽禁無雙名郭香察書者察蒞他人之書及唐徐浩古迹記以為蔡中郎書余按碑文云京兆尹勑監都水掾霸陵杜遷市石句遣書佐新豐郭香察書市石察書為二事則洪公言似亦有據但書雖遒徑殊不類中郎郭香何人乃蒞中郎書耶且市石察書刻者皆著其名而獨無中郎名何也徐浩生唐盛時去漢近其人又深于字學不應謬妄至此皆不可曉至如楊文貞公跋遂以為郭香書則察字無屬不成文理矣此碑嘉靖中猶在一縣令修嶽廟石門視殿上碑題皆當時顯者恐獲責罰此碑年久遂碎為砌石余從東肇商借舊本而書其後如此云魏封孔羡奉孔子祀碑梁鵠字孟星學書于師宜官舉孝廉官至選部尚書漢靈帝重之曹孟德愛之王逸少學之梁武評其書云龍威虎震劍拔弩張是其書亦可重者此碑結法古質遒健未知果為鵠書否碑後題曹植詞鵠書出張稚圭亦曰按圖記與卒史碑同殊不可曉魏百官勸進碑此碑或曰梁鵠書或曰鍾繇書未有的據但𨽻法遒古非二公不能自是鐘鼎間物也魏文帝受禪碑此傳是司徒王朗文梁鵠書太傅鍾繇刻石謂之三絶碑又云即鍾繇書亦未有的據然謂為鍾書者出顔魯公言或不妄𨽻法大都與勸進碑同王元美曰以太傅手腕使書前後出師表刻七尺珉不遂與日月照映哉但其文與事海內士所指而唾罵者寶玩不忍釋手孰謂書一藝也又曰余始喜明皇泰山銘見此而恍然自失也漢法方而瘦徑而整寡情而多骨唐法廣而肥媚而緩少骨而多態漢如建安唐三謝時代所壓故自不得超也此語得評書三昧并識之晉將軍周孝侯碑宜興周處碑元美考據極詳大都謂碑文記處以身殉國死戰矣而忽又云元康九年因疾捐館前後不續考吳晉俱無元康年號且贈處將軍賜葬地給其母醫藥酒米等皆永平七年戰歿時事其後十五年建武元年乃諡孝侯而碑併作建武年事建武元年陸機已歿安得文及之蓋碑前陸機撰下有空石後人妄增羲之書以重其價耳又碑後云唐元和六年歲次辛卯義興令陳從諫重樹此石協律郎黃某書尤為可疑余則謂碑中有唐元和重樹等語實出黃某所書其人習右軍者後人見似右軍遂加羲之字陸平原文不及諡孝侯事重書刻時或以意增之耳而以身殉國以下元康九年等語錯簡則不可曉豈陳從諫刻後又有刻者亂之耶然不應謬妄至此今但以其書有右軍遺意姑存之以待博識者後魏魯郡太守張猛龍碑猛龍為魯郡太守郡人立碑而頌之正書虬健已開歐虞之門户碑首正書大字十二尤險徑又蘭臺之所自出也猛龍不見史册據碑諱猛龍字神􅂒而金石録有劉乾碑諱乾字天魏人名字如此亦異矣後魏修孔子廟碑李仲璇為兖州都督修孔廟建碑事在興和三年史官稱之是時髙歡與宇文泰方確鬭關洛而東魏又當遷都之際仲璇乃能改修孔廟崇尚文儒賢矣碑正書時作篆筆間以分𨽻形容竒怪考古書法大小篆謂之篆東漢諸碑減篆筆有批法者謂之𨽻以篆筆作𨽻書謂之八分亦謂之𨽻正書謂之今𨽻亦謂之楷然則如此碑篆耶分耶古今𨽻耶後魏豆盧恩碑史恩附兄寧傳曰永恩今據碑蓋以字行耳碑稱保定二年贈柱國大將軍涪陵郡公史稱贈少保幽冀等五州諸軍事幽州刺史諡曰敬似當以碑為正碑在咸陽恩墓前𨽻書令尹王公家瑞求得之余摹一紙多不堪讀而王公所刻金石遺文尚存強半蓋從碑下録之耳後魏周惠逹碑此與豆盧恩碑皆咸陽令王公所得視豆盧碑稍完𨽻書王公刻其文止缺三十三字而拓本則不可讀矣碑首大魏故司空匡穆周公之碑銘篆書十二字宛然如新按史傳與碑略同碑具當時贈諡而史無之史但云開皇初追贈蕭國公云後周華嶽頌碑碑文万紐于瑾造趙文淵書按瑾唐瑾賜姓史稱其著碑頌數十萬言此其一也而文詞殊無超拔其稱趙文淵云雅有鍾王之則筆勢可觀宇文泰時命文淵與黎季明等刋定六體嘗至江陵書景福寺碑梁主稱之又以題榜功增封邑除郡守後雖外任每須題榜輒復追之竇臮賦云文淵孝逸獨慕前蹤至師子敬如欲登龍有宋齊之面貌無孔薄之心胸然則文淵書在當時固自知名此碑天和二年造正其書路寢等榜後也故官稱趙興郡守云碑字小變𨽻書時兼篆籕正與李仲璇孔廟碑同亦褚河南聖教歐陽蘭臺道因之所由出也江陵景福寺碑不知存否此則完好無一字磨泐固文淵之幸哉文淵史避唐祖諱作文深隋安喜公李使君碑奉天鄉人掘得此碑樹之上官村廟前余過觀榻二紙𨽻書亦自遒逸而碑頗完使君涼武昭王之後祖景超員外散騎侍郎父通逸使持節東南道都督狄道縣開國子季父琰之出牧荆郡使君仕開府儀同三司使持節卭州諸軍事卭州刺史安喜縣公開皇十六年卒十七年樹碑皆歷歷可讀而獨闕使君名按使君與唐同宗官亦不卑隋史無傳遂不可考使君祖父季父獨琰之見魏書耳因知史官闕略如此類者不可勝計也隋海陵公賀若誼碑此碑正書方整精健是唐初諸人前茅在興平縣文廟宋人磨其隂刻夫子廟記而此文止存十三聞曾完好一縣令苦貴人之摹拓使捶去之誼事見隋史本傳兹不贅云隋龍藏寺碑龍藏寺即今真定府龍興寺碑尚存碑書遒徑亦是歐虞發源但碑立于開皇六年時齊滅已久而張公􅭄尚稱齊官何也又碑稱造寺者太師上柱國太威公之世子使持節左武衛將軍上開府儀同三司恆州諸軍事恆州刺史鄂國公金城王孝􅀈史傳逸之遂無所考隋陳明府修孔子廟碑陳明府名叔毅字子嚴陳宣帝子為曲阜令修孔子廟仲孝俊為文樹此碑碑書亦頗有漢魏分𨽻法而集古録金薤琳琅俱不載唯金石録有之且都玄敬謂隋碑少傳自云嗜好垂三十年止得皇甫君龍藏碑姚辨志江夏磚塔記四種皇甫碑唐刻以是觀之都才有三種余所録乃四碑并常醜奴志李淵記為六而皇甫智永不在其中安得起玄敬于九原而誇示之隋智永真草千字文智永傳其家逸少法無一筆不合此刻于大觀間精良可寶也南部新書永居長安西明寺寫千文八百本但是律召調陽乃真迹蓋草聖召字似吕故俗本誤作律吕調陽徐散騎亦誤為吕夫以閏餘對律召是其義也今本正作召字隋常醜奴墓志醜奴始平人為都督熒澤令大業元年卒志在興平崇寧寺壁間為童子摩挲幾平余榻一紙書亦不大佳但以隋物存之興平即古始平今不知墓所在隋李淵為子世民祈疾記此唐髙祖也記稱鄭州刺史李淵為男世民目患先於此寺求仙蒙仙恩力其患得損敬造石碑像一鋪願此功德資益弟子男合家大小福德興足永無災障弟子李淵一心供飬後署大業二年正月八日按是時太宗才九歲耳而史稱髙祖為譙隴岐三州刺史不曰鄭州此亦可以證史之闕隋皇甫誕碑皇甫君名誕殁於隋而碑立於唐以子無逸貴也于志寧撰歐陽詢書王元美謂比之信本他書尤為險徑是伊家蘭臺發源余謂其徑而不險特用筆之峻一變晉法耳可為楷法神品碑舊在鳴犢鎮今在西安府學戊子余君房督學作亭覆之丙申亭圯壓碑中斷故剝二十餘字至是又亡其五十餘字余所收乃未斷時拓本深寶惜之石墨鐫華卷一
