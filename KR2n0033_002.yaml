  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0033_WYG_002-1a, image: WYG0683/WYG0683-0466a.png}
body:
  text: 石墨鐫華卷二明趙崡撰跋四十三首唐刻石經考漢靈帝光和六年刻石五經文于太學講堂此初刻也蔡雍以熹平四年與五官中郎將堂溪典議郎張訓韓説太史令單揚求正定六經文字帝許之雍乃書丹刻石立于太學門外此再刻也魏正始中又立古篆𨽻三體石經古文用科斗鳥迹體篆用史籒李斯胡母敬體𨽻用程邈體此三刻也魏世宗神龜元年以王彌劉曜入洛石經殘毁崔光之請補之此四刻也唐天寶中刻九經于長安禮記以月令為首從李林甫之請此五刻也文宗時鄭覃以經籍刓繆建言讐刋凖漢故事太和七年勑唐玄度覆定石經字體于國子監立石九經并論語孝經爾雅共一百五十九卷字樣四十卷開成二年告成此六刻也又孟蜀亦刻九經謂之孟蜀石經朱晦翁所引石經是此按六朝以前用分𨽻今石經皆正書且多用歐虞書法知其為唐人書矣禮記首月令尊明皇純字諱尊憲宗又知其非天寶以前人書矣然則今西安府學石經乃唐文宗時石經也舊在務本坊韓建築新城棄之于野朱梁時劉鄩用尹玉翁請遷故唐尚書省之西隅宋元祐中汲郡吕公始遷今學嘉靖乙卯地震石經倒損西安府學生員王堯惠等按舊文集其缺字别刻小石立于碑傍以便摹補又按唐書謂文宗朝石經違棄師法不足觀然其用筆雖出衆人不離歐虞禇薛法恐非今人所及惟王堯惠等補字大為紕繆今華下東生文豸家有乙卯以前拓本庶幾稱善焉右本喬景叔説唐晉祠之銘唐得天下後太宗祠晉侯而為之銘晉侯者周唐叔後霸天下者也據碑髙祖起兵時會禱于晉侯之祠而以是報享之太宗製文并書全法聖教序蘭亭而縱橫自如但石理惡歷年多其鋩鎩之存者無幾耳唐李英公碑公陪葬昭陵碑文高宗製并書行草神逸機流後半尤縱橫自如良由文皇藏右軍墨迹如蘭亭之類極夥故其父子青宫萬機之暇一意模倣以至此也碑首御製御書四字大類禇登善余會至碑下見碑高大過房杜諸臣豈以陛下家事之一言而為是以報之耶唐萬年宫銘萬年宫即九成宫改名高宗幸而銘之書之也行草視英公碑尤為徑拔唐萬年宫碑隂題名碑隂云奉勑中書門下見從文武三品以上并學士并聽自書官名于碑隂後列從官五十餘人長孫無忌李績禇遂良輩皆與焉書名大小不倫然皆有法即契苾賀蘭亦不草草一時之盛令人仰想其後武氏亂之而不復可觀矣唐景龍觀鐘銘景龍觀者中宗所作景雲二年睿宗為之鑄鐘製銘也字正書而稍兼篆𨽻竒偉可觀鐘今在西安府城鐘樓唐紀太山銘玄宗御製并書文詞雅馴而分𨽻遒逸婉潤最為得意之筆刻在太山髙崖字大六七寸石方三丈極不易拓王戶部堯年為彼中司理見餉一紙如獲明珠王元美云余嘗登泰山轉天門見東二里許穹崕造天銘書若鸞鳳翔舞于雲煙之表為之色飛惜其下三尺許為拓工惡寒篝火焚蝕遂闕百餘字云唐玄宗注孝經碑此碑四面以蟠螭為首鑿嵌精工故非後世所能開元帝書法與太山銘同潤色史惟則老徑豐妍如泉吐鳳為海吞鯨非虛語也後有李齊古表行書亦佳同勒諸臣名字字不草草至如行押數十字尤豪爽可喜乃知前代帝王留心翰墨如此唐升仙太子碑武曌淫橫千古而亦假借柔翰天之生才于彼何其不靳也此文未必真出后手當是北門學士語碑首升仙太子之碑六大字飛白書作鳥形亦佳飛白書久不傳于世此其僅存者耳唐述聖紀碑立乾陵今倒仆折為數段止存兩段耳據金石録武后製中宗書字法遒健深得歐虞遺意非中唐以后所辦也唐集右軍聖教序并記此碑為百代書法模楷今時尤重拓者無虛日風骨鋩鎩俱無存者形似耳然其筆法隱然可尋余曽見舊拓十數本獨長安一田生本為善今已為按察僉事劉公餘澤索去餘皆不及也余所收本乃二十年前物較之今拓猶勝真可寶惜王元美曰右軍真迹自禊帖外不應行法大小勻整乃爾且梵字多所不備小小展縮偏傍湊合所不免也又曰玄奘既託之文皇懷仁又託之右軍以不朽其業即令逹磨師見之不滿一笑耳唐三藏聖教序并記此以序與記分刻二碑于慈恩寺塔下分東西兩龕置之風雨與童牧俱不能及是以能久而不毁書法遒健然用筆輕細后署永徽四年書似不及同州本唐三藏聖教序并記此以序記并書一碑在同州遒逸婉媚波佛處虬如鐵線后署龍朔三年書似勝慈恩本右二碑王元美考年代官品以為不合署名處疑皆後人附益良是但元美未嘗至關中遂不知二碑所在耳余又按玉海太宗製聖教序髙宗為太子又述記并勒碑置慈恩寺浮圖永徽四年十月褚遂良書則大塔本似是真迹而同州本反勝何也唐九成宫醴泉銘歐書皇甫君遒徑此碑婉潤允為正書第一碑已缺殘余曽見一舊拓已為貴人擕去浙中余所收乃二十年前物近復致得數紙其中被縣令使石工鑿三十餘字則余本又為難得矣宋趙子固謂率更化度醴泉為楷法第一今巋然獨存者醴泉耳化度寺在朱雀街今禾黍離離無復蘭若之迹不知碑亡在何時每至其地悵然者久之唐孔子廟堂碑評者謂虞永興書如層臺緩步髙謝風塵又如行人妙選罕有失詞觀此碑果不虛也賈耽相公云孔子廟堂碑青箱至寶今碑已經五代翻刻尚爾則當時可知但碑已斷泐在西安府學余嘗至其處見碑傍一片石取視之則碑之破裂者如此恐後人不復得見此書可勝慨哉唐集右軍殘碑此碑斷缺棄西安城南隍中王生堯惠輩見之以語郡守舁置頖宫碑為大將軍吳文立𢎞福寺僧大雅集右軍書余觀其筆法去聖教逺甚應是集字者不及懷仁而碑中有開元九年字疑又從聖教序諸刻中摹集非右軍真迹也唐昭仁寺碑碑在長武縣朱子奢撰無書者姓氏余觀其筆法大類廟堂廟堂豐逸此稍瘦徑廟堂五代重勒此伯施真迹也歐公亦不言誰書鄭樵直以為伯施都玄敬謂必有據而曹明仲曰歐陽通書通書道因諸碑殊與此不類按舊唐書貞觀三年詔建義以來交兵處為隕身戎陳者各立一寺令虞世南朱子奢等為之碑此破薛舉處也又通本傳少孤母徐氏教以父書儀鳳中始知名貞觀三年至儀鳯元年四十八年道因碑書在龍朔三年去貞觀三年亦三十五年則此非通書明甚而虞與朱同事其為虞書亡疑曹明仲又以虞恭公碑在宜祿巡檢司虞恭公溫彥博也陪葬昭陵碑正在醴泉宜祿巡檢司即今長武縣明仲蓋誤以昭仁為恭公耳且恭公碑亦是信本書非通也明仲之誤如此據其言者可謂無目唐少林寺碑碑首太宗文皇帝御書七大字分書出開元帝中刻太宗征王世充時移寺主并軍民檄所謂御書即此也但其中止世民二字以渴筆草書填之餘皆正書不類文皇而開元帝以為御書賜額何也下方則裴懿公漼撰述寺之始末并書漼負文筆號霹靂手不以書名而此文殊不及書書法秀徑其得意處漸升伯施之堂矣唐北嶽廟碑碑鄭子春撰崔鐶書鐶無書名此碑分𨽻遒逸直當韓蔡雁行而無樹碑年月考其時張守圭鎮幽州當在開元之末耳諸家無録者何也唐玄元靈應頌碑中南樓觀宗聖觀尹喜宅也玄宗夢老子真容得于此玉真公主為道士居于此故此碑述夢事以及玉真歸美唐室倉部郎中戴璇撰序户部郎中劉同升撰頌開府儀同三司尚書右僕射曽孫戴伋書書法分𨽻頗豐潤第骨力乏耳稱曽孫為璇也然則碑云天寶元年建不知追成頌序之日而稱乎抑亦當伋時乎伋官僕射而史不書遂無從考唐宗聖觀碑此與前為一碑而刻其陽隂為唐刻此則為元翻刻按碑建于武德九年歐陽詢撰序陳叔逹撰銘為神堯祀尹喜作也分𨽻書無書者姓氏書法故自佳經翻刻失其筆意耳王元美云叔逹以黃門侍郎判納言事而此碑云侍中蓋武德三年改納言仍為侍中宰相表則叔逹以二年正兼納言九年十月坐事罷而傳遺之當以此碑為定唐房梁公玄齡碑碑已泐僅存六百餘字褚河南正書結法與聖教序同可寶也舊唐書諱喬字玄齡碑曰諱玄齡字喬當是以字行后復以名為字耳新唐書從碑唐申公髙士廉塋兆記碑僅存三百餘字考金石録許敬宗撰趙模書碑稱公諱儉字士廉則公亦以字行但房公名喬字玄齡以字行而碑曰諱玄齡字喬歐陽公嘗以為疑云新唐書房玄齡字喬以髙公塋兆記觀則喬果為字乎此似未見房公碑者趙模在貞觀中以書名嘗與諸葛貞臨蘭亭刻石者此書方整秀逸大類歐虞惜不全見碑側題字數行亦半泐其一云會昌四年五月四日六代孫尚書左丞元裕拜云云塋所其一云六代孫正議大夫行給事中上柱國渤海縣開國男食邑三百戶賜紫金魚袋少逸云云謹附名題于碑側會昌四年五月十五日按唐史稱元裕少逸相代兄弟迭處禁中又曰會昌中少逸為給事中然則此正兄弟相代時也而史不書少逸封爵且又不言二人為士廉後唐世重氏族豈其譜逸耶二人立朝亦非沒沒者非此幾令申公不得有其孫矣唐虞公溫彥博碑信本此碑字比皇甫九成差小而結法嚴整不在二碑下王元美曰如郭林宗標格清峻而虛和近人考溫公卒貞觀十一年是時信本年已八十餘而楷法精妙如此虞伯施嘗謂信本齊紙筆豈亦齊老少耶惜碑已殘后世不復見耳唐中書令崔敦禮碑此碑久仆少傳于世余起而拓之有千餘字于志寧撰文名氏尚存據金石録無書者姓氏而書法方整圎健與王知敬書李衛公碑如出一手或當是知敬書金石略以為子立政書未知是否崔公先名元禮髙祖改敦禮字安上金石録曰崔安禮誤唐祭酒孔頴逹碑此碑于志寧撰不著書者名氏其書全習虞永興而結法稍踈自非中唐以後人所辦黃長睿亦云世傳為永興書非也祭酒歿后永興十年乃學永興法者書也碑半沒土中據集古録已謂磨滅而摘其與史傳不同者傳字仲逹碑字沖逺碑與魏鄭公同修隋書而傳不著傳又不著頴逹卒時年壽今碑字沖逺與修隋書事尚如新年壽字半泐隱隱可讀云貞觀二十二年六月十八日薨春秋七十有五然則歐公所有碑與今碑略同數百年間豈無剝蝕之災且昭陵諸碑多不可讀而孔公碑獨尚如此或公有功于六經而鬼神呵護之耶唐李衛公靖碑碑下半磨泐上半完好考金石録為許敬宗撰王知敬書知敬書在當時固自知名評者謂與房玄齡殷仲容伯仲余觀此碑遒美直是歐陽率更虞永興之匹敵也歐陽永叔謂碑云為安撫使史云為撫慰使碑靖為刑部尚書時行太子左衛率封衛國公時授濮州刺史酬其爵邑子孫承嗣后雖不行皆史宜書余考前二事誠如歐公但舊唐書傳有改封衛國公授濮州刺史仍令代襲例竟不行等語宋祁修新唐書削之但曰改衛國公耳歐公正與宋公同事何得云宜書不書也且舊史云本名藥師碑與新史皆作字藥師公又有弟名客師豈先名藥師后改曰靖而以藥師為字耶唐褒公段志玄碑公封褒國公時亦授金州刺史見舊唐書而新唐書亦削之何也且史云志玄父偃師至郢州刺史碑云散騎常侍益都縣開國公贈洪州都督八州諸軍事諡信公碑云志玄從破薛舉劉武周云云而史不書碑云諡忠壯舊史同而新史曰壯肅其刺謬不合如此惜碑全者僅半尚未得詳考耳至如碑書撰俱無名氏書法雖方整不無少遜崔安上李藥師碑然于正書中時作一二筆分𨽻是六代遺習唐中書令馬周碑此碑在大道傍周墓前殘缺為甚存者僅四百餘字非篆額字存幾不知為馬周碑今摩碑者多不摩額是一恨也據金石録許敬宗撰殷仲容書仲容名書此碑分𨽻有法雖存者少亦足以觀矣唐莒公唐儉碑此碑在昭陵東南最逺而地僻故傳者極少余至其下摹一紙真行書輕圓秀徑卓然名家惜無姓氏考舊史官為立碑碑雖殘缺后有夫人河南元氏又有皇唐開元草年等字或開元時始建碑耶似不可曉唐太常卿薛收碑此碑殘缺存者數十字耳碑額題太常卿汾隂獻公據史永徽間贈太常卿而不書諡見史之佚者多也碑書法亦類王知敬趙模而無名氏撰者據金石録為于志寧唐芮公豆盧寬碑寬欽望祖也髙祖改其姓為盧氏永徽中復姓豆盧氏有子懷讓尚萬春公主又有子仁業即欽望父也史不為立傳但附見欽望傳中碑已殘泐僅數十字無從考其始末幸碑額亡恙知為寬碑正書精健有法而無名氏撰者據金石録為李義甫唐薛公阿史那忠碑碑泐其存者稍倍于豆盧寬碑亦以額識之而書法更徑拔在永興河南間惜撰書俱無名氏可考耳唐尚書張後胤碑碑額題故禮部尚書碑已殘其可讀者有云故金紫光祿大夫張胤有云二十三年除散騎常侍出陪鸞輅有云第四子巽第六子小師並早亡第五子律師泗州司馬云云考唐史儒學傳有張後胤即其人而碑曰張胤豈字後胤耶舊史無字而新唐書曰字嗣宗然則後字衍耶碑書撰俱無姓氏書法精健是得河南之支流而開平原之門戶者唐左監門將軍王君碑碑書徑健可録額題左監門將軍王君而多泐其存者有云武德九年授內侍有云貞觀四年遷左監門將軍進爵為公有云尋加正議大夫內侍如故有云吐谷渾據龍沙有云又出使吐蕃有云二十二年遷使持節云云其人蓋宦官而曽與李衛公同征吐谷渾者也碑缺其名而史亦不書當是唐初尚無觀軍容使之權耳唐將軍張阿難碑碑書大似李衛公碑殘泐特甚中有云內侍汶江縣開國侯張阿難又有云銀青光祿大夫內侍汶江縣開國侯張又有云勇冠三軍掃定河汾等語其人蓋宦官而曰勇冠三軍得無溢美乎唐初開國宦寺為公侯魚李之禍兆矣唐禇亮碑亮遂良父也由陳入隋由隋入唐八十八卒碑已殘闕不可詳考分𨽻與馬周碑如出一手疑亦殷仲容書遂良能書非仲容輩恐不得汙其父碑也唐薑遐斷碑遐者謨之孫行本之子史但附兄簡傳云弟柔逺美姿容善敷奏則天時至左鷹揚衛將軍通事舍人內供奉寥寥數語亦不云名遐遐之子即薑皎而撰書遐碑者乃簡之子晞代簡襲行本爵為郕國公者也書全法登善而結小弱碑上段已亡止有下一段棄墓側余摩而録之按遊景叔刻昭陵圖止有薑確墓確行本名史亦云行本陪葬昭陵而俱不及柔逺何也唐蘭陵公主碑蘭陵公主太宗第十九女名淑字麗貞駙馬都尉慶州諸軍事使持節慶州刺史扶風竇懷哲太穆皇后孫銀青光祿大夫上柱國竇德素子也史書竇氏二十餘人無德素名而公主傳但言哲為太穆皇后族子而已此碑亦可以備史之闕撰者據金石録為李義甫無書者名姓而方整徑拔亦歐虞之流亞也唐涼國公主碑此蘇頲撰開元帝分書帝書潤色史惟則而此碑稍肥要之一變漢法者也公主碑名花莊史作華莊先封仙源嫁薛稷子伯陽伯陽坐父稷流嶺表再嫁溫彥博曽孫曦史遺曦不書而碑諱不言伯陽唐許洛仁碑洛仁附見許世緒傳末數語碑載甚詳但半泐不可讀正書極似隋賀若誼碑方整有之而徑拔則當逺遜顔平原唐乙速孤昭祐碑昭祐名神慶本姓王氏太原人五代祖顯魏驃騎大將軍賜姓乙速孤遂為京兆醴泉人曽祖貴隋河州刺史和仁郡公祖安益州都督父晟唐驃騎將軍代有顯人神慶高宗時為太子右虞候副率檢校左領軍將軍上柱國以卒史不立傳且不復姓王氏不可曉碑苖神客撰釋行滿書書亦徑健有法然不及王知敬趙模諸人唐乙速孤行儼碑行儼字行儼神慶子也墓相去不十餘步二碑并峙余皆摩之而因以知神慶尚有子行儼仕為右武衛將軍也碑為劉憲撰白羲晊分書書亦跳拔宜居韓蔡之亞考歐陽公有神慶碑而未見行儼碑且前碑五代祖五字甚明而公以為闕文或所見偶闕本耳石墨鐫華卷二
