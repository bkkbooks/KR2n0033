所蓄舊碑最富自序稱所收過於都穆楊慎而視歐陽修才三之一視趙明誠才十之一然宋元以上多歐趙所未收者欲刋其全文而力不足以供匠氏故但刻其跋尾凡二百五十三種其曰石墨鐫華者取劉勰文心雕龍誄碑篇句以所收石刻居多故也每碑目録之下各註其地兼仿陳思寳刻叢編之例金元國書世不多見亦仿集古録摹載鐘鼎之例收之頗為詳備惟所跋詳于筆法而畧于攷証故岣嶁碑比干墓銘之類皆持兩端而所論筆法於栁公權夢英蘇軾黄庭堅皆有不滿亦僻於一家之言然一時題識語有出入自集古録以下皆所不免不能獨為崡咎也至所載古碑頗多未備則由崡本貧士其力止於如斯觀附録二卷所載三記及詩其求索之勞亦云備至不必以挂漏為譏矣乾隆四十三年閏六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀石墨鐫華自序余不敏八歲時從先大夫在重慶郡守朱秉器先生博學好古手虞伯施書授余使余臨摹余時兒嬉不能有得也既歸為諸生困於制科文不暇旁及然私心竊嚮慕古人每獲一名碑必摩弄累日不忍釋去余居近周秦漢唐故都諸名書多在焉西安頖宫碑林為最余每至其下必坐卧觀之至於忘返芒蹻所及片石隻字必且駐觀其佳者輒䟽記之以後好事貴人慫慂摹搨從乞副本并請之友人之宦逰四方者於今三十餘年矣憶宋歐陽公趙明誠洪丞相明都𤣥敬楊用修皆能博收古碑註釋評證傳之將來今洪丞相𨽻釋刻本最少歐之集古録趙之金石録都之金薤琳瑯楊之金石古文則人所共睹記也考其收録歐僅四百餘趙至二千都楊二公數不及歐以余三十年所收雖過都楊而視歐才三之一視趙不能十之一自宋元以上徃徃有二公所不及收者即諸公書亦自有無互異豈不以搜訪之難哉且諸公版本具在而求其石蹟亡者已過半矣余死之日余所收録亦與浮烟飄靄俱盡良足悲也暇日命裝池成帙置一長几髙齋永晝或追尋徃哲或模倣名書披賞之餘妄加管見書於各卷之尾又恐他日將與此卷同為烏有而已因搃録其語付諸棗棃余目不能識書乃敢謬議古人何足存者但因余言而使後之好古者如余之取徴諸公未必非斯文之一助也且余於諸公書最愛都楊二公全文抄刻即石蹟已亡取徴猶備而負廬所入不足以既匠氏故用歐趙二公例獨刻䟦語刻成竊取劉勰氏之言以名其書曰石墨鐫華示諸同好無不稱善者追惟三十年前在重慶時秉噐先生徃矣安能起九原而與之上下之斯文未喪其為秉噐先生不知凡㡬有能益我以所未見者余雖老矣飲啖尚徤天假之年將有續篇就政君子萬厯戊午秋七月五日中南敦物山人趙崡子函父撰
