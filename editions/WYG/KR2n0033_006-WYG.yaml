body:
  text: 石墨鐫華卷六明趙崡撰䟦四十一首宋蔡襄萬安橋記王元美云萬安天下第一橋君謨此書雄偉遒麗當與橋争勝結法全自顔平原惟䇿法用虞永興耳余觀此書雄偉遒麗實有之然結法似平原而無其𦂳宻䇿法似永興而無其秀逸此則時代為之非君謨之罪也宋蔡襄荔枝譜此閩中刻刻手不佳而君謨正書猶有永興遺意蘇黄米三家不及也評者謂土偶蒙金寃矣宋蘇軾書醉翁亭記此新鄭公得之徽廢邸者公命摹刻摹者文夀承故能縱横自如字字不失真態其真蹟一入江陵再入大内今世所傳乃摹本耳王元美再三致疑初以為不似公書公沒后有王逸老者自欲出懐素上或是其筆又或陸務觀張溫甫軰戲為之后又云渇筆縱筆拂䇿磔掠有折釵股屋漏痕法以為公興到書則又不類又云趙吳興宋昌裔沈啟南吳原博䟦是入石時壽承作此使倆無一真者當盡割去之以備一家余蓄有此帖亦時展玩其中無一筆類長公者但此君筆法雖不能盡脱宋習却勝長公何不自顯姓名而署長公耶殆不可曉然謂或為長公興到書則斷無是理也諸䟦非真亦似有據苐無從証之宋蘇軾書上清宮詞上清宮即徐鉉作碑述神人降于鳯翔者今在盩厔盩厔昔屬鳯翔子瞻判鳯翔過此要子由同賦薛紹彭請書刻石遒逸豐羙比公他書尤勝石舊在本宮一道士院中斷為二余與余友徐宣伯偶過觀之搨二紙其后邑侯王公之栩移置衙齋作磚亭焉宋蘇軾書樓觀詩詩刻在唐靈應頌碑側遒逸可觀元人以磨泐别摩一碑今時搨者是元刻原碑側字雖不可搨而視此霄壤矣詩則余不敢知為何語也宋蘇軾仙遊塔題字塔上有唐畫天王鬼神子瞻謂非吳道子不能而題其下方云云書雖用卧筆而時作渇筆甚有素師藏真律公二帖意比公他書不同即上清詞亦當遜其俊爽宋章惇草堂寺題記子厚與子瞻遊而題此書亦用卧筆間作渇筆遊絲法亦遒逸可存也宋蘇元老龍洞記元老深得君家卧筆法此記亦似之石泐不可讀間有存者數字耳宋蔡京草堂寺題記蔡太師故非端人而書自不惡此自龍圖閣出知永興軍祀髙觀潭題者考其時與章子厚相繼而至書雖遜子厚乃兩人濟惡政當同觀宋米芾蕪湖縣學記米顛大言于書家少所許可而自作此札側筆縱筆雖極雄傑不免粗踈王元羙乃稱其有千金蹀躞過都厯塊之氣恐未敢信也宋米芾第一山大字此刻在盱眙縣中南樓觀石乃摹刻耳縱逸飛動殊有一夫當闗之勢宋黄魯直狄梁公碑自古正書法無作傾側筆者晉人法在態中故圓而多逸唐人態在法中故方而多遒宋初諸人猶遵唐矩四大家出而唐法盡變競為傾側矣魯直其尤甚者而昔人乃謂狄公事范公文黄公書為三絶即文正文篇法靡弱與黄公何絶之有試以視裴公文李西平而誠懸書為何如毋言蔡中郎之于郭有道也宋黄魯直夷齊墓碑余始謂黄書傾側盡變唐法又得此碑而不覺失席也碑乃黄書而無一筆類梁公碑者法全出禇登善聖教序瘦勁絶人䇿拂鈎磔㡬無遺恨但結體踈少遜登善耳疑一人手腕豈其懸殊若是且黄他書俱與此不類何也今世字學出蘇黄者強半遂令唐法不傳不知黄故自能傳唐法者也至如碑稱夷齊之不立必其宗與國人有不説者又云二子之事孔孟之所不言不足信則宋人迂謬之談徃徃如此宋黄魯直了元歌唐故騰襌師作語俚甚似于禪家宗乘未見一班書亦劣無姓名世謂為魯直疑非是宋黄魯直草庵歌此書作行筆稍勝狄梁公碑倔強傾側緫不及夷齊碑石頭和尚口語亦殊鄙僿不足再觀宋薛紹彭詩刻虞學士集評書謂坡谷出而魏晉之法盡米元章薛紹彭黄長睿方知古法又云長睿書不逮言惟紹彭最佳而世遂不傳米氏父子世學其竒怪據此似于坡谷之后獨取紹彭也今中南樓觀有紹彭書詩刻余凡得五紙其一書唐人玉真公主莊玉真觀諸詩小楷法出入黄庭洛神無一毫渗漏其一書蘇子瞻詩其一書其􅅩薛周詩其一書王工部詩其一書一絶句字稍大或作真行其法皆自晉唐絶不作側筆惡態真可寳也紹彭號翠㣲居士其父師正重模定武蘭亭其子嗣昌刻智永千文盖世有書學者伯生之鑒精矣哉宋李騊逰中南詩刻李騊通判秦中留題中南而鄠令崔珙書刻石騊詩珙書皆不離宋人本色留之以見時代之下人自不能使超也崔珙是又一人非唐廢相起判鳯翔者宋草堂寺舍利亭記記作分𨽻書腕自遜古而時有一二筆効唐以前人者不堪抵掌宋慈雲寺集右軍書詩此晉之玉兎寺志應請之張仲尹詩之静萬集右軍書之集書起自文皇聖教后之興者蔑以加矣此書尚不及絳州碑僅存形似耳詩則余不敢知也金普照寺興造記碑唐文皇曠世雄才削平海内以其餘力恣意臨池其臣又有率更永興軰共成之故能集成聖教師法千秋自此而后集書未有及之者普照碑建自金時當兵戈草昧之后有仲汝尚文頗盡致而集公權書方整遒勁𦂳宻處殊勝公權自書不啻與聖教代興碑署仲汝羲刻疑集書即出其手不有君子其何能國金之謂矣碑云寺是王右軍故宅未辨真偽而王元美直以為淮南公捨是又增一妄也金趙秉文草書刻趙秉文金禮部尚書號閒閒居士嘗為張天錫序草書韻㑹云徘徊閒雅之容飛走流注之勢驚竦峭㧞之氣卓犖跌宕之志矯若㳺龍疾若驚蛇似邪而復直欲㫁而還連千態萬狀不可端倪亦閒中之一樂也觀此則其自負可知而此諸詩草法頗似鄭駙馬心經王元美謂不中素師作奴者然則閒閒其不免元章重儓之誚乎金博州重修廟學記王庭筠在金與趙秉文党懐英軰同負書名而庭筠酷似南宮此書是也攷是時庭筠父遵古寔成廟學事王去非記之而令庭筠書之故尤為得意篆額者即懐英也金博州廟學碑隂此亦王庭筠書其父記字差大結構風骨似不及前碑金中岳廟碑此碑正書方整遒勁盖習清臣誠懸而兼運以永興者于金碑中最為妙品書者名郝史不立傳亦無書名觀其結構王庭筠軰似不及也党懐英號為能書乃任篆額不任書知郝書在當時亦自知名碑立于大定中興博州碑同時世宗勵精政事頗稱太平故以其暇得修祀事耳金都綂經略郎君行記郎君稱皇弟無姓名天㑹十二年記當為太宗之弟按金史世祖子十一人自康宗太祖太宗而外尚八人未知誰是碑一字不能辨葢女真字如是王元美所録明王慎徳四夷咸賔八字正與此同法而此凡一百五字后有譯書漢字具録左方亦一異也字刻乾陵無字碑上大金皇弟都綂經略郎君嚮㠯疆場無事獵于梁山之陽至唐乾陵殿廡頺然一無所睹爰命有司鳩工修餙今復謁陵下繪像一新回廊四起不勝欣懌與醴陽太守酣飲而歸時天㑹十二年嵗次甲寅仲冬十有四日尚書職方郎中黄應期宥州刺史王圭从行奉命題右譯前言元集顔書黙菴記黙菴者道士邢道安所築而趙良弼為之記菴當樊川之上景色殊佳記亦簡盡可讀集書亦是懐仁之流亞也但苻秦釋道安居川之東南今洞存而邢亦名道安豈其後身耶良弼兩副㢘希憲商挺為陕西宣撫叅議后陞行省叅議未嘗為宣撫使而蒲知常䟦曰宣撫使盖尊稱之詞元趙孟頫孫公道行碑此趙孟頫書雖出李北海而加以婉媚所可取者生宋四家後能一變其傾欹筆耳以方北海北海瘦而勁拙于藏鋒承㫖肥而緩巧于取態而元美謂姿韻溢出于波拂間葢能用大令指于北海腕者其然乎他日又曰承㫖可出宋人上比之唐人尚隔一舍此則定論也元趙孟頫勅藏御服碑此碑亦婉媚大都如前碑而稍遜其圓逸御服者元成宗感異夢而以賜孫徳彧于萬夀宫者也今尚在道士所時出觀之訛為王喆衣者非元趙孟頫番君廟碑此承㫖暮年筆亦覺老勁而不及孫公碑番君者長沙王吳芮也無大功徳而二千年后尚祀不絶何也元趙孟頫裕公和尚碑福裕無他異行至贈儀同三司爵濫乃爾承㫖書不甚如意圓熟有之而姿態不足亦不及孫徳彧御服二碑元趙孟頫𤣥元十子賛中南樓觀有此碑石理惡泐已甚字之存者形似耳南中聞有此碑未知誰是真本元趙孟頫佑聖觀記王元美謂此書規摹北海余得一紙一字不損而肥緩殊乏筋骨摹本耶聊存之以俟知者元重陽仙跡碑姚牧菴璲追書金劉祖謙文文頗藴藉而書全法顔平原但波拂鈎磔稍不及因以知勝國時不乏能書者也元重陽教祖碑王重陽在金遇異人度為全真其徒丘處機軰為張大其説而行之其道以全真而兼禪者此碑為宻國公璹撰李道謙書書亦模倣平原然尚不及姚璲仙跡碑元馬丹陽碑丹陽王嚞髙足弟子也與其妻俱得道王利用為碑孫徳彧書文頗詳腴書亦有平原遺意但用筆過肥不免墨猪耳元䝉古字碑重陽萬壽宮元碑無數皆以蒙古字書而以漢字譯之䝉古字法皆梵天伽盧之變也故皆與佛氏真言相類其書亦有佳者有不佳者其署年月處用䨇鈎書如今世傳飛白字王元羙所載蒙古八字又若符篆草書與此不同不曉何故但厯年既久敝邑有力者多以此為元碑取作他用今存者尚五六碑不能悉録僅録一碑文一年月字并譯文具左方與即君行記同作異觀長生天氣力裏大福廕䕶助裏皇帝聖㫖軍官每根底軍人每根底管城子逹嚕噶齊官人每根底徃來使臣每根底宣諭的聖㫖青吉思皇帝伊克岱皇帝色辰皇帝旺扎勒圖皇帝庫魯克皇帝聖㫖裏和尚也里可溫先生每不㨂甚麽差發休當告天祝夀者宣諭的有來如今也只依在先聖㫖體例裏不㨂甚麽差發休當告天祝夀者麽道奉元路大重陽萬夀宫裏并下院宮觀裏住的先生每根底執把行的聖㫖與了也這的每宮觀庵廟裏房舎裏使臣休安下者鋪馬祗應休著者税粮休與者但屬宮觀裏的水土人口頭疋園林碾磨店舍鋪席典庫浴堂船栰車輛不㨂甚麽他的更渼陂甘澇等三處水例甘谷山林不㨂是誰休倚氣力者休奪要者這的每却倚着有聖㫖麽道沒體例的勾當休做者做呵他每不怕那甚麽聖㫖虎兒年七月二十八日察罕倉有時分寫來至正十八年八月日至元十四年五月日右别二碑署年月字如此元重修說經䑓碑李道謙文記修説經䑓事幷及老聃之道纚纚數千言格雖卑冗意亦詳盡如謂孔子師承老子孟子不非蒙莊又以武帝信方士淮南好黄白隋唐行符籙至丹藥竒技悉附道家為亂老子皆殊有㫖趣碑書出李志宗真行不大佳道謙正書教祖碑雖近墨猪而亦頗遒偉何不自書乃使志宗操筆耶元希聲堂碑希聲堂元建在説經䑓北下一級今廢而建閣獨朱象先所為碑存碑詞卑不足觀而杜道堅書非𨽻非分去古益逺于法益盭如吾子行所謂挑㧞平硬若折刀頭者不復可得殊令人有韓蔡諸人之想元文始碑此杜道堅撰書文始先生者尹喜也今殿與碑尚存詞本蕪冗而書與希聲堂碑正同亦弱不足存也元篆書道徳經碑余所蓄篆書神禹碑壇山石有疑非真者石鼓文出史籕手披之恍遊三代下此則李陽氷縉雲城隍廟記為最蓋其字細而遒飛動如神歐陽公乃以細疑之不知篆正以細為佳如李斯嶧山翻刻子羙有肥失真之誚夫肥為失真則其真正當瘦勁如縉雲碑也不然先塋三墳亦陽氷手筆何一經翻刻亦肥失真耶其餘如英太師郭忠恕雖甚誇詡終遜古人髙翿者李道謙稱其善于古篆此書雜出頡籕欵識古文大小二篆沾沾自喜尚不堪郭忠恕一嗤者暇日與諸篆碑同觀而題此于后不知于法當否元正書道徳經碑此似出杜道堅李志宗軰而無名氏如枯樹枝無復生意聊與篆碑俱存以備一種趙崡曰余集古碑自唐以前雖斷殘必録至宋以後便擇其佳者至國朝諸名書不敢概及以待後之博雅君子亦猶歐陽修趙明誠之不及于宋也且以余所見錄古碑者自歐趙而外多慿耳食致使後之人無所徴信如鄭夾漈之金石略朱長文之古碑考曹明仲之格古要論紕繆十五何以稱焉求其考據精審者于宋莫若黄長睿于有明莫若王元羙余么䯢雖不能望二公然寜遜博之名不敢不求精之寔其撰書姓名所在州郡苟非目見不敢妄書而碑多殘泐不能如趙明誠之以年月叙也遂用歐陽公例随所得先後略分世代而已至于妄加譏評以貽誚讓使余不佞藉是以不朽抑亦有厚幸焉石墨鐫華卷六
