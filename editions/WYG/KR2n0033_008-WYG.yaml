body:
  text: 石墨鐫華卷八明趙崡撰詩三十二首由南時村之重陽宫觀元朝諸碑林薄逗朝景清泉㵼澗鳴元宫在其南一逕仄復平下馬問羽流相見不識名坐我古殿傍棟宇半頽傾斷碑認殘字功徳記先氓穹碑跱龍趺仙蹟滅且眀逰盼窮千年安能永長生倦言日已西歸卧聊柴荆觀道士所藏孫徳彧遺服仙客何年去遺袍賜勑聞機絲鮫室淚刀尺漢宫雲碑載元人字名餘學士文誰能悟蟬蛻搔首問茅君逰樓觀歸遇雨晨駕来終南周覧畢夕景青林滋華茂緑草紛苕穎逶迤行路岐參差度前嶺樓殿出山巔高居列仙境若木䕃石犀扶桑覆丹井紫氣望不極白日焉能永嵯峩㓜婦辭坐卧觀索靖仙游自一時感激發深省飄風從西来雲霧變俄頃歸途雨冥冥寒薄侵衣領物態有如此一嘯青天冷仙逰寺危逕轉深入諸天隠上方随刋經帝刀締構自前皇昔代宸逰地今時卓錫鄉棟櫨千刼氣丹碧十尋光寳樹沾花雨叢林有異香潭聲珠唄落山色翠眉長虎豹蒼巖伏蛟龍白晝藏側身窺雁影跼歩造雲荘石立疑鯨動橋飛訝蝀翔對門玉女洞隔水朗公房仙吹聞雙管禪心話半牀世縁如可棄吾欲禮空王渡渭漢苑秦宫接渭橋中流一葦盪雙橈連天樹色疑顛倒斷岸人家忽動揺浦口沙寒来徃月城頭風落古今潮停舟指㸃前朝事王氣諸陵黯未消南上官村觀隋李使君碑石獸荒凉卧夕曛孤村麥隴淡黄雲殘碑拂拭開皇字功業依稀識使君馬嵬驛亦是武帝黄山宫茂陵劉郎過黄山後車盡譲傾城顔漁陽鼙鼓烟塵起鳯輦倉皇墜玊環羽衣不奏哀蟬息廢驛荒城春草色千古詞人空復愁海上逰䰟招不得應夢寺訪苟子若誠約逰九􅉄嗟余白髮叟奈爾黒頭何縱酒須能醉論詩不啻過江山雙目少花鳥一春多且共尋幽賞行行得和歌荘河村主人落日牛羊嶺上村誰開三徑召王孫山容似黛斜侵檻水字如巴曲到門野客行藏無揖譲田家賔主有盤樽欲將谷口煙霞色並向桃源洞裏論弔昭陵陪葬諸臣碑遥望九􅉄山古冡何纍纍上有名王宫下藏賢臣衣結髪等苦樂焉能不相随冥廬長安寢楊名觀豊碑文采曜天壤書篆蹟嶔﨑日月既以邁金石衰草萎守冡非昔人誰知傾與頽兵燹同樵牧焚擊莫禁之况及盛明朝富貴多文詞顧言屬茂宰摹搨無停時田父怒其害約結偕操錐斷者棄溝壑存者字亦稀生面開凌烟感彼杜甫詩英姿罷颯爽悲思徒空垂又無葱菁樹靈爽何所棲日暮聊騁眺長嘯増歔欷將登昭陵阻大風雨率爾短歌君不見九􅉄山鴻濛突出涇渭間岡峰横截青天色俯視日月如雙丸恠石谽谺勢絶斗大者鯨吞小虎吼唐帝龍髯此上升玉柙珠襦今何有御道曽聞鳳輦臨𤣥宫不復熊羆守悲哉文武之臣附蟄冡纍纍千秋魂􅅎能相依余也過之生慷慨腰有長虹倚翠㣲恍惚似聞神靈怒鞭驪龍兮叱馮夷澎澎湃湃狂風驟雨如翻浪山精木鬼白日争跌宕疑是浴銕三萬自東来鼔吹前后聲悲壮又疑是褒公鄂公酣戰時大呼動天天震盪君不見昨日天晴今日隂眼中之事等浮雲漢家長陵竄野鼠秦帝驪山空草痕願提一斗酒澆君青樹根盡灑英雄恨千古雨捲風收天地昏登昭陵衆山忽破碎突兀一峰青地􅎃蟠千里神功闢五丁風雲行殿合松柏翠華停寂寞攀冉者何人問夜扄宿東莊山逕高復下行行望村烟墟里産荆棘深巷絶塵喧主人貎朴陋稚子皆驚看言辭多孟浪逢迎少顧瞻自云窮山陰經月無時鮮嘉節及朱夏厲風凛冬寒豆麥苗一尺藿茹豈成餐割鷄供黍食陳酒如太𤣥日入無眀燭刈薪聊代然欣然為醉飽反覺禮數寛寢我茅茨下終夜抱膝眠天明主人至相見歡且慚欲别復躊躇愛此太古賢山行青天何處不堪捫石蹬巉巖嚙屐痕山氣将龍驕日馭泉聲挟雨闘雲根羊膓忽轉東西磵馬􅈡徐開逺近村欲學向平尋五岳便拚婚嫁棄兒孫烟霞洞是鄭子真隠處流水柴門曲曲斜青山有洞鎻烟霞野人不識當年事咲道鄰無姓鄭家茂陵黄山歴盡見孤城城上樓高眼倍明芳樹寢園今北望暮雲宫闕舊西京芙蓉晝冷仙翁露苜蓿春閒宛馬聲回首長楊誇獵地何人得似馬卿名過興平徐明府招飲明府巴人先大夫曽貳巴郡不勝故人之感情見乎辭客有并州意逄君話兩川江聲通白帝山色上青天綵服趋庭夢星軺出刺年向來風木涙沾灑一金筵薦福寺過楊㢘夫故居二􅈡古寺嚴城外曽來問子雲踈鍾仙梵落雙樹佛燈分身老思蘭臭時違歎鹿群誰將兩行涙沾濕到荒墳已公結屋處送老梵宫天徑草虛逰屐牀書撫斷編塔知埋雁後月傍誦經年負土侯生在相依守太𤣥楊門生猶有讀書其中者興善寺閣讀故觀察劉公㤙徴㽜題上方高閣鳳城南慧窟禪枝恣所探忽有新詩披謝朓翻令清淚灑羊曇乾坤六象搜難盡日月雙輪轉自叅無那世縁俱􅄫滅暫從芳澤問遺簮登慈恩寺塔日出東南行騁目川原上白雲忽飛馳森木紆朝爽寳刹欝崔嵬琉璃耀平莾昔人陟其巔徘徊蒼梧想題名在四壁勝蹟御雲徃灰刼亦已乆施梯及吾黨振䇿鴻濛天飛轡巨靈掌西極俯帝都東溟招方丈城郭渺何處睥睨敝窮壌曲江落日閒行曲江頭曲江曲裏草油油古瓦滿地蒼䑕逰千門宫殿等浮漚芙蓉園中牧兒謳樂逰苑上今王丘原遷水竭歴千秋覆茅為屋深耕耰朱雀橋邊縶紫騮我欲弔之總百憂開元盛時稱皇州三山之沼象瀛洲瑪瑙珍盤薦五侯昭陽麗質開眀眸江花照眼江水流物色生態待龍斿少年進士群相逑黄金勒馬翡翠裘青娥隊隊来勸酬亂挿繁花盈道周大腹胡兒操長矛天子倉皇為下樓才人公子成髑髏天隂鬼哭長啾啾涇渭東流不斷愁野老吞聲哭未休盛事一去寜再㽜落霞紫雲空宴㳺今代中丞王子猷新亭安穏時窮搜眼中亭圯無人脩况乃唐家土一抔仰天長嘯清且遒古木森爽風颼飂興教寺高原行忽斷老樹掩雲屯水散龍池逺峰孤玉案尊敗垣驚變相殘碣繡苔痕昔日翻經意維摩許更論普光寺貝闕珠宫倚翠微跏趺終日澹忘歸蓮花忽自波中見鷲影欹從檻外飛栁底鳴蛙關動定松間馴鶴識皈依龍池亦是東林社不必廬山好息機叅無壊禪師觀所遺衣物開士何年至郍提訪故知振鈴醒萬刼分乳食千兒什襲㽜衣鉢莊嚴奉國師誌公飛錫處雲氣繞龍池杜曲行逰杜陵巖巖下有晨炊茅屋數十家翳翳夏木齊遥岑結雨脚亂水眀稻畦繫馬長條間箕坐復踟躇昔有杜陵老在此深巖居華族多貴逹麗藻盛文詞此人旣云徃地靈亦以移花光比酒濃豈復如昔時村人但耦耕兹事不能知撫心悲先民攬筆作此詩蕐嚴寺杜陵原上草樹遮蕐嚴寺傍山水涯浴鳬飛鷺水田逈過雨㽜雲山色賖老僧施食去扄戶童子乞火来烹茶法堂東閣半沉寂讀罷殘碑坐日斜過公謹宗尉庄兼懐長房社友茂林蔽修逕敷草帶高岡薄言事逰遨夏陰清且長倚原結茅茨避喧如柴桑竹樹覆短垣蓬蒿豈就荒亭館出其巔參差摩穹蒼爾家近韋杜嗟彼羙人行羙人好兄弟結侣唯清狂識我亦已乆竒文數與商安得有樽酒對坐話𠂻腸一醉何所求良時多感傷牛頭寺野寺荒原上登登逕轉遥禪房穿樹杪珠閣擘山腰坐久花頻落談深鳥故驕淹㽜従老衲寂寞話前朝宿香積寺寺北汾陽破賊處迢迢御宿川落落香積寺殿頽塔裂不記年斷碑猶拂開元字開元之後此出師胡兒六萬首皆碎我来宿寺中徘徊動遐思空山日落雨冥冥古木荒村鬼火青尚父忠勲那在眼至今惟有佛燈眀百塔寺遥望百塔寺寺邊塔纍纍下有敷榮草上有紛披枝借問此下人長卧亦何其心結如金石骨化隨塵灰慧澤廣無外圎光照地垂色身寜有極生願為芻尼草堂哀舊逰諸君子紫閣對圭峰古寺三五處松栢蔽其隂日夕起烟霧二十年間三来逰我歌爾和偕交素吁嗟乎哀莫哀兮昔日之人今朝露一哀兮魏生意氣無知流謂魏邦逹二哀兮韓郎識面如荆州謂韓期維三哀兮一代風流王子猷謂王家瑞四哀兮京兆眉間翠黛愁謂張自守五哀兮韓家難弟雙吴鈞謂韓化六哀兮小王翩翩舄鳬逰謂王宣七哀兮徐穉高歌更莫酧平生意氣輕王侯謂徐汝為作者七人不可遮眼前山水音悲嗟此行携得東床兒謂王允濓我昔逰時爾童牙今也能探虎豹窟彩筆飛揚凌嵂崒老態龍鍾應避鋒狂来曾負崚嶒骨不随逝者為髑髏且向山中書咄咄嗚呼仰天長嘯兮生死交情不能忘年過半百多悲傷更有羅含在逺方謂羅秀士安得雙涙随大江大江東流無止息紫閣圭峰千古色但使圭峰紫閣如礪堅一生一死那足言石墨鐫華卷八
